<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FibreGuard Ad Performance Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-0: #06080D;
    --bg-1: #0A0E17;
    --bg-2: #111825;
    --bg-3: #1A2236;
    --bg-hover: #1C2844;
    --border: rgba(255,255,255,0.06);
    --border-light: rgba(255,255,255,0.10);
    --text-1: #F0F2F5;
    --text-2: #94A3B8;
    --text-3: #5B6B84;
    --blue: #60A5FA;
    --blue-10: rgba(96,165,250,0.10);
    --blue-20: rgba(96,165,250,0.18);
    --blue-40: rgba(96,165,250,0.35);
    --purple: #A78BFA;
    --purple-10: rgba(167,139,250,0.10);
    --green: #34D399;
    --green-10: rgba(52,211,153,0.10);
    --orange: #FBBF24;
    --orange-10: rgba(251,191,36,0.10);
    --red: #F87171;
    --red-10: rgba(248,113,113,0.10);
    --gold: #FFD700;
    --radius: 16px;
    --radius-sm: 12px;
    --radius-xs: 8px;
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --glass-bg: rgba(255,255,255,0.03);
    --glass-border: rgba(255,255,255,0.06);
    --glass-blur: blur(20px);
    --shadow-card: 0 4px 24px rgba(0,0,0,0.2);
    --shadow-card-hover: 0 12px 40px rgba(0,0,0,0.35);
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg-0);
    background-image: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(96,165,250,0.06) 0%, transparent 60%),
                       radial-gradient(ellipse 50% 40% at 80% 80%, rgba(167,139,250,0.04) 0%, transparent 50%);
    background-attachment: fixed;
    color: var(--text-1);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* Heading font */
  h2, h3, .section-title h2, .history-title, .report-title {
    font-family: 'Poppins', 'Inter', sans-serif;
  }

  /* TOPNAV */
  .topnav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px; border-bottom: 1px solid var(--glass-border);
    background: rgba(6,8,13,0.7); backdrop-filter: blur(24px) saturate(1.4);
    position: sticky; top: 0; z-index: 100;
  }
  .topnav-left { display: flex; align-items: center; gap: 14px; }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo img {
    height: 26px; width: auto; object-fit: contain;
  }
  .logo-sep { width: 1px; height: 20px; background: var(--border); }
  .logo-sub { font-size: 13px; color: var(--text-3); }
  .topnav-right { display: flex; align-items: center; gap: 10px; }
  .meta-text { font-size: 11px; color: var(--text-3); }

  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 8px 14px; border-radius: var(--radius-xs);
    font-size: 12px; font-weight: 500; font-family: inherit;
    cursor: pointer; border: 1px solid var(--glass-border);
    background: var(--glass-bg); color: var(--text-2);
    transition: all 0.3s var(--ease-out);
    backdrop-filter: blur(12px);
  }
  .btn:hover { border-color: var(--border-light); color: var(--text-1); background: rgba(255,255,255,0.06); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn svg { width: 13px; height: 13px; }

  /* CONTAINER */
  .container { max-width: 1400px; margin: 0 auto; padding: 24px 28px; }

  /* FILTERS */
  .filters-bar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
    margin-bottom: 24px; padding: 14px 18px;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    backdrop-filter: var(--glass-blur);
  }
  .filter-group { display: flex; align-items: center; gap: 5px; }
  .filter-label {
    font-size: 10px; font-weight: 600; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  select {
    background: var(--bg-2); border: 1px solid var(--border);
    color: var(--text-1); padding: 6px 26px 6px 10px;
    border-radius: var(--radius-xs); font-size: 12px; font-family: inherit;
    cursor: pointer; appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%235B6A85' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: right 8px center;
  }
  select:focus { outline: none; border-color: var(--blue); }
  .pill-group { display: flex; gap: 3px; }
  .pill {
    padding: 6px 13px; border-radius: 20px; font-size: 11px; font-weight: 500;
    cursor: pointer; background: var(--glass-bg); color: var(--text-3);
    border: 1px solid var(--glass-border); transition: all 0.3s var(--ease-out); font-family: inherit;
  }
  .pill:hover { color: var(--text-2); background: rgba(255,255,255,0.05); }
  .pill.active { background: var(--blue-10); color: var(--blue); border-color: var(--blue-20); box-shadow: 0 0 12px rgba(96,165,250,0.15); }
  .live-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-right: 4px; animation: livePulse 2s infinite; }
  @keyframes livePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .filter-spacer { flex: 1; }

  /* TBD BANNER */
  .tbd-banner {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; margin-bottom: 20px;
    background: var(--orange-10); border: 1px solid rgba(251,191,36,0.12);
    border-radius: var(--radius-xs); font-size: 12px; color: var(--orange);
  }

  /* SECTION */
  .section { margin-bottom: 36px; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title { display: flex; align-items: center; gap: 10px; }
  .section-title h2 { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
  .section-icon {
    width: 28px; height: 28px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center; font-size: 13px;
  }
  .icon-awareness { background: var(--blue-10); color: var(--blue); }
  .icon-engagement { background: var(--purple-10); color: var(--purple); }
  .icon-traffic { background: var(--green-10); color: var(--green); }
  .section-count {
    font-size: 11px; color: var(--text-3); background: var(--bg-2);
    padding: 3px 8px; border-radius: 10px; border: 1px solid var(--border);
  }

  /* FORMULA */
  .formula {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    padding: 10px 14px; margin-bottom: 14px;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: var(--radius-xs); font-size: 11px; color: var(--text-3);
    backdrop-filter: blur(12px);
  }
  .formula strong { color: var(--text-2); }
  .chip {
    display: inline-flex; padding: 2px 7px; border-radius: 4px;
    font-weight: 600; font-size: 10px;
  }
  .chip-blue { background: var(--blue-10); color: var(--blue); }
  .chip-purple { background: var(--purple-10); color: var(--purple); }
  .chip-green { background: var(--green-10); color: var(--green); }

  /* Score info bubble */
  .score-info-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--bg-2); border: 1px solid var(--border);
    color: var(--text-3); font-size: 11px; font-weight: 700;
    cursor: pointer; margin-left: 8px; transition: all 0.15s;
    flex-shrink: 0;
  }
  .score-info-btn:hover { background: var(--text-3); color: var(--bg-0); }
  .score-info-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  .score-info-overlay.open { opacity: 1; pointer-events: all; }
  .score-info-modal {
    background: var(--bg-0); border: 1px solid var(--border);
    border-radius: var(--radius-md); max-width: 520px; width: 90%;
    padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    max-height: 80vh; overflow-y: auto;
  }
  .score-info-modal h3 { margin: 0 0 6px; font-size: 16px; color: var(--text-1); }
  .score-info-modal .score-info-sub { font-size: 12px; color: var(--text-3); margin-bottom: 16px; }
  .score-info-modal .score-formula-block {
    background: var(--bg-1); border: 1px solid var(--border);
    border-radius: var(--radius-xs); padding: 12px 14px; margin-bottom: 10px;
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
    line-height: 1.7; color: var(--text-2);
  }
  .score-info-modal .score-formula-block strong { color: var(--text-1); }
  .score-info-modal .score-legend {
    display: flex; gap: 16px; margin-top: 14px; font-size: 12px; flex-wrap: wrap;
  }
  .score-info-modal .score-legend span { display: flex; align-items: center; gap: 5px; }
  .score-info-modal .score-legend .dot { width: 8px; height: 8px; border-radius: 50%; }
  .score-info-modal .score-targets { margin-top: 12px; font-size: 12px; color: var(--text-3); line-height: 1.6; }
  .score-info-modal .score-targets strong { color: var(--text-2); }
  .score-info-close {
    float: right; background: none; border: none; color: var(--text-3);
    font-size: 20px; cursor: pointer; padding: 0; line-height: 1;
  }
  .score-info-close:hover { color: var(--text-1); }

  /* SUMMARY */
  .summary {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px; margin-bottom: 18px;
  }
  .summary-card {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm); padding: 16px;
    backdrop-filter: blur(16px);
    transition: all 0.3s var(--ease-out);
  }
  .summary-card:hover {
    background: rgba(255,255,255,0.05); border-color: var(--border-light);
    transform: translateY(-2px); box-shadow: var(--shadow-card);
  }
  .summary-label {
    font-size: 10px; font-weight: 600; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px;
  }
  .summary-value { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
  .summary-sub { font-size: 10px; color: var(--text-3); margin-top: 2px; }

  /* AD GRID */
  .ad-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  /* AD CARD */
  .ad-card {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: var(--radius); overflow: hidden;
    transition: all 0.4s var(--ease-out); position: relative;
    backdrop-filter: blur(16px);
    box-shadow: var(--shadow-card);
  }
  .ad-card:hover {
    border-color: rgba(255,255,255,0.12);
    transform: translateY(-4px) scale(1.008);
    box-shadow: var(--shadow-card-hover);
  }

  /* WINNER CARD */
  .ad-card.winner {
    border-color: rgba(255,215,0,0.35);
    box-shadow: 0 0 24px rgba(255,215,0,0.08), var(--shadow-card);
  }
  .ad-card.winner:hover {
    box-shadow: 0 0 36px rgba(255,215,0,0.14), var(--shadow-card-hover);
  }

  .winner-crown {
    position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
    z-index: 10; background: var(--gold); color: #000;
    font-size: 10px; font-weight: 800; padding: 3px 12px;
    border-radius: 0 0 8px 8px; letter-spacing: 0.5px;
    text-transform: uppercase;
    box-shadow: 0 2px 8px rgba(255,215,0,0.3);
  }

  /* VISUAL */
  .ad-visual {
    height: 160px; background: var(--bg-1);
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .ad-visual img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.6s var(--ease-out);
  }
  .ad-card:hover .ad-visual img { transform: scale(1.05); }
  .ad-visual-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    color: var(--text-3); opacity: 0.5;
  }
  .ad-visual-placeholder svg { width: 28px; height: 28px; }
  .ad-visual-placeholder span { font-size: 10px; }

  .badge-platform {
    position: absolute; top: 8px; left: 8px;
    padding: 3px 8px; border-radius: 5px;
    font-size: 10px; font-weight: 600;
    backdrop-filter: blur(8px);
  }
  .plat-instagram { background: rgba(225,48,108,0.85); color: white; }
  .plat-facebook { background: rgba(24,119,242,0.85); color: white; }
  .plat-tiktok { background: rgba(0,0,0,0.9); color: #69C9D0; font-weight: 700; }
  .plat-unknown { background: rgba(85,96,120,0.85); color: white; }

  .badge-status {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    padding: 2px 8px; border-radius: 4px;
    font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase; backdrop-filter: blur(8px);
  }
  .status-live { background: rgba(52,211,153,0.85); color: #000; }
  .status-paused { background: rgba(251,191,36,0.85); color: #000; }
  .status-ended { background: rgba(248,113,113,0.7); color: #fff; }
  .status-budget-spent { background: rgba(120,120,120,0.85); color: #fff; }
  .status-new { background: rgba(96,165,250,0.85); color: #000; }

  /* Grayed-out card for completed / paused ads */
  .ad-card.budget-spent {
    opacity: 0.3;
    filter: grayscale(80%);
    order: 999; /* push to end */
  }
  .ad-card.budget-spent:hover { opacity: 0.55; filter: grayscale(50%); }
  /* When "Hide Completed" toggle is active, fully hide them */
  .ad-grid.hide-completed .ad-card.budget-spent { display: none; }

  /* Live ad card — bold green glow to stand out */
  .ad-card.ad-live {
    border: 1.5px solid rgba(52,211,153,0.50);
    background: linear-gradient(160deg, rgba(52,211,153,0.10) 0%, var(--glass-bg) 50%);
    box-shadow: 0 0 24px rgba(52,211,153,0.12), 0 0 8px rgba(52,211,153,0.08), var(--shadow-card);
  }
  .ad-card.ad-live:hover {
    border-color: rgba(52,211,153,0.65);
    box-shadow: 0 0 36px rgba(52,211,153,0.18), 0 0 12px rgba(52,211,153,0.12), var(--shadow-card-hover);
    transform: translateY(-3px);
  }
  .ad-card.ad-live::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, rgba(52,211,153,0.2), rgba(52,211,153,0.9), rgba(52,211,153,0.2));
    border-radius: 8px 8px 0 0;
    z-index: 5;
  }
  .ad-card.ad-live::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, rgba(52,211,153,0.2), rgba(52,211,153,0.9), rgba(52,211,153,0.2));
    border-radius: 0 0 8px 8px;
    z-index: 5;
  }

  /* New/pending ad card */
  .ad-card.ad-new {
    border: 1px dashed rgba(96,165,250,0.4);
  }

  .badge-score {
    position: absolute; top: 10px; right: 10px;
    padding: 5px 12px; border-radius: 8px;
    font-size: 11px; font-weight: 700; color: #fff;
    background: var(--orange);
    letter-spacing: 0.4px; text-transform: uppercase;
    box-shadow: 0 2px 8px rgba(251,191,36,0.3);
  }

  /* CARD BODY */
  .ad-body { padding: 16px; }
  .ad-name {
    font-size: 12.5px; font-weight: 500; line-height: 1.45;
    margin-bottom: 12px; color: var(--text-1);
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
    min-height: 36px;
  }

  /* AI INSIGHT */
  .ai-insight {
    display: flex; align-items: flex-start; gap: 7px;
    padding: 9px 11px; margin-bottom: 12px;
    background: linear-gradient(135deg, rgba(96,165,250,0.06), rgba(167,139,250,0.06));
    border: 1px solid rgba(96,165,250,0.10);
    border-radius: var(--radius-xs);
    font-size: 11px; line-height: 1.5; color: var(--text-2);
    backdrop-filter: blur(8px);
  }
  .ai-insight-icon {
    flex-shrink: 0; margin-top: 1px;
    font-size: 10px; opacity: 0.7;
  }

  .ad-metrics {
    display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
    margin-bottom: 12px;
  }
  .ad-metric {
    padding: 10px 12px; background: rgba(255,255,255,0.025); border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.04);
    transition: all 0.2s ease;
  }
  .ad-metric:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.08); }
  .ad-metric-label {
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-3); margin-bottom: 3px;
  }
  .ad-metric-value { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; color: var(--text-1); }

  /* CARD FOOTER */
  .ad-footer {
    display: flex; align-items: center; justify-content: center;
    padding-top: 10px; border-top: 1px solid var(--border);
  }

  .bench-tbd {
    font-size: 11px; font-weight: 500; color: var(--text-3); padding: 4px 12px;
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 20px; letter-spacing: 0.3px;
  }

  /* SPARKLINE */
  .sparkline-wrap {
    margin-bottom: 12px; padding: 9px 10px;
    background: rgba(255,255,255,0.02); border-radius: var(--radius-xs);
    border: 1px solid rgba(255,255,255,0.03);
  }
  .sparkline-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 5px;
  }
  .sparkline-title {
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.3px; color: var(--text-3);
  }
  .sparkline-trend {
    font-size: 10px; font-weight: 700; display: flex; align-items: center; gap: 3px;
  }
  .sparkline-trend.up { color: var(--green); }
  .sparkline-trend.down { color: var(--red); }
  .sparkline-trend.flat { color: var(--text-3); }
  .sparkline-svg { display: block; width: 100%; height: 32px; }
  .sparkline-empty {
    font-size: 9px; color: var(--text-3); opacity: 0.6;
    text-align: center; padding: 6px 0;
  }

  /* COMPARE VIEW */
  .compare-group {
    margin-bottom: 20px; background: var(--bg-2);
    border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden;
  }
  .compare-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    background: var(--bg-1);
  }
  .compare-thumb {
    width: 48px; height: 48px; border-radius: 8px;
    object-fit: cover; flex-shrink: 0;
  }
  .compare-thumb-placeholder {
    width: 48px; height: 48px; border-radius: 8px;
    background: var(--bg-3); display: flex; align-items: center;
    justify-content: center; color: var(--text-3); font-size: 16px; flex-shrink: 0;
  }
  .compare-ad-info { flex: 1; min-width: 0; }
  .compare-ad-name {
    font-size: 12px; font-weight: 600; color: var(--text-1);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .compare-ad-type {
    font-size: 10px; color: var(--text-3); margin-top: 2px;
  }
  .compare-table {
    width: 100%; border-collapse: collapse;
  }
  .compare-table th {
    padding: 8px 12px; font-size: 9px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.4px;
    color: var(--text-3); text-align: left;
    border-bottom: 1px solid var(--border); background: var(--bg-1);
  }
  .compare-table td {
    padding: 10px 12px; font-size: 13px; font-weight: 600;
    color: var(--text-1); border-bottom: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }
  .compare-table tr:last-child td { border-bottom: none; }
  .compare-table tr:hover td { background: var(--bg-hover); }
  .compare-plat-cell {
    display: flex; align-items: center; gap: 6px;
  }
  .compare-plat-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .dot-instagram { background: #E1306C; }
  .dot-facebook { background: #1877F2; }
  .dot-tiktok { background: #69C9D0; }
  .dot-unknown { background: #556078; }
  .compare-winner-cell {
    color: var(--gold); font-weight: 800;
  }
  .compare-best {
    font-size: 8px; font-weight: 700; color: var(--gold);
    background: rgba(255,215,0,0.1); padding: 1px 5px;
    border-radius: 3px; margin-left: 4px; text-transform: uppercase;
  }
  .compare-insight {
    padding: 10px 16px; border-top: 1px solid var(--border);

  .compare-empty {

  }
  .compare-stat {
    background: var(--bg-1); border-radius: var(--radius-xs);
    padding: 10px 12px; text-align: center;

  /* EMPTY */
  .empty {

  /* LOADING */
  .loading {

  /* FADE-IN ANIMATION */
  @keyframes fadeInUp {

  .ad-card:nth-child(2) { animation-delay: 0.06s; }
  .ad-card:nth-child(3) { animation-delay: 0.10s; }
  .ad-card:nth-child(4) { animation-delay: 0.14s; }
  .ad-card:nth-child(5) { animation-delay: 0.18s; }
  .ad-card:nth-child(6) { animation-delay: 0.22s; }
  .ad-card:nth-child(7) { animation-delay: 0.26s; }
  .ad-card:nth-child(8) { animation-delay: 0.30s; }
  .summary-card { animation: fadeInUp 0.4s var(--ease-out) both; }
  .summary-card:nth-child(1) { animation-delay: 0s; }
  .summary-card:nth-child(2) { animation-delay: 0.04s; }
  .summary-card:nth-child(3) { animation-delay: 0.08s; }
  .summary-card:nth-child(4) { animation-delay: 0.12s; }
  .summary-card:nth-child(5) { animation-delay: 0.16s; }
  .summary-card:nth-child(6) { animation-delay: 0.20s; }
  .summary-card:nth-child(7) { animation-delay: 0.24s; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

  /* HISTORY MODAL */
  .history-overlay {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
    overflow-y: auto; padding: 40px 20px;
  }
  .history-overlay.open { display: flex; justify-content: center; align-items: flex-start; }
  .history-container {
    background: var(--bg-1); border: 1px solid var(--border);

  .history-close:hover { background: var(--bg-3); color: var(--text-1); }
  .history-empty {

  }
  .history-empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }

  .history-kpi-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.3px; }
  .history-kpi-value { font-size: 18px; font-weight: 800; margin-top: 2px; }
  .history-kpi-delta { font-size: 10px; font-weight: 600; margin-top: 2px; }
  .history-chart-box {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 16px; margin-bottom: 16px;
  }
  .history-chart-title { font-size: 12px; font-weight: 600; color: var(--text-3); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.3px; }
  .history-charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .history-snapshots-table {
    width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 16px;
  }
  .history-snapshots-table th {
    text-align: left; padding: 8px 10px; color: var(--text-3); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.3px; font-size: 10px;

  }
  .history-snapshots-table td {
    padding: 8px 10px; border-bottom: 1px solid var(--border); color: var(--text-2);
  }
  .history-snapshots-table tr:hover td { background: var(--bg-2); }

  /* REPORT MODAL */
  .report-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
    overflow-y: auto; padding: 40px 20px;
  }
  .report-overlay.open { display: flex; justify-content: center; align-items: flex-start; }
  .report-container {
    background: var(--bg-1); border: 1px solid var(--border);

    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  }
  .report-close {
    position: absolute; top: 16px; right: 16px;
    background: var(--bg-2); border: 1px solid var(--border);

  .report-close:hover { background: var(--bg-3); color: var(--text-1); }

  .report-summary {
    font-size: 14px; line-height: 1.6; color: var(--text-2);

  .report-highlights {

  .report-highlight {

  .report-concern {
    padding: 8px 14px; background: var(--red-10); color: var(--red);

  .report-section {
    margin-bottom: 24px; padding: 20px; background: var(--bg-2);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
  }
  .report-section-title {
    font-size: 15px; font-weight: 700; margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .report-section-content {
    font-size: 13px; line-height: 1.6; color: var(--text-2); margin-bottom: 12px;
  }
  .report-metrics-row {
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .report-metric-card {
    flex: 1; min-width: 120px; padding: 12px;
    background: var(--bg-1); border-radius: var(--radius-xs);
    border: 1px solid var(--border);
  }
  .report-metric-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.3px; }
  .report-metric-value { font-size: 18px; font-weight: 700; margin-top: 2px; }
  .report-metric-trend { font-size: 10px; font-weight: 600; margin-top: 2px; }
  .trend-up { color: var(--green); }
  .trend-down { color: var(--red); }
  .trend-neutral { color: var(--text-3); }
  .report-chart-container {
    margin: 20px 0; padding: 16px; background: var(--bg-2);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
  }
  .report-chart-title { font-size: 12px; font-weight: 600; color: var(--text-3); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.3px; }
  .report-charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .report-rec {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px; background: var(--bg-2); border: 1px solid var(--border);
    border-radius: var(--radius-xs); margin-bottom: 8px;
  }

    padding: 2px 8px; border-radius: 4px; font-size: 9px;
    font-weight: 700; text-transform: uppercase; flex-shrink: 0;
  }
  .priority-high { background: var(--red-10); color: var(--red); }
  .priority-medium { background: var(--orange-10); color: var(--orange); }
  .priority-low { background: var(--blue-10); color: var(--blue); }
  .report-rec-text { font-size: 13px; color: var(--text-2); }
  .report-rec-reason { font-size: 11px; color: var(--text-3); margin-top: 3px; }

  /* Date picker for report */
  .report-picker {
    display: flex; flex-direction: column; align-items: center;
    gap: 16px; padding: 40px;
  }
  .report-picker h3 { font-size: 18px; font-weight: 700; }
  .report-picker p { font-size: 13px; color: var(--text-3); }
  .report-date-options { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .report-date-btn {
    padding: 10px 20px; border-radius: var(--radius-xs);
    background: var(--bg-2); border: 1px solid var(--border);
    color: var(--text-2); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; font-family: inherit;

  .report-date-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-10); }
  .report-loading {

  @media (max-width: 768px) {

    .filters-bar { flex-direction: column; align-items: stretch; }
    .summary { grid-template-columns: repeat(2, 1fr); }
    .report-charts-grid { grid-template-columns: 1fr; }
    .report-container { padding: 20px; }
    .platform-cards { grid-template-columns: 1fr !important; }
  }

  /* ====== LOGIN SCREEN ====== */
  .login-screen {
    position: fixed; inset: 0; z-index: 10000;
    background: var(--bg-0);
    background-image: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(96,165,250,0.08) 0%, transparent 60%),
                       radial-gradient(ellipse 50% 40% at 80% 80%, rgba(167,139,250,0.05) 0%, transparent 50%);
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .login-screen.hidden {
    opacity: 0; pointer-events: none; transform: scale(1.02);
  }
  .login-box {
    text-align: center; max-width: 380px; width: 90%;

  .login-logo {
    margin-bottom: 32px;
  }
  .login-logo img {
    height: 36px; opacity: 0.9;
  }
  .login-subtitle {
    font-size: 13px; color: var(--text-3); margin-top: 8px;
    letter-spacing: 0.5px;
  }
  .login-code-group {
    display: flex; gap: 12px; justify-content: center; margin: 32px 0 20px;
  }
  .login-code-input {
    width: 56px; height: 64px; text-align: center;
    font-size: 24px; font-weight: 700; font-family: 'Poppins', sans-serif;
    background: var(--bg-2); border: 2px solid var(--border);

  @keyframes loginShake {

    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }
  .login-hint {
    font-size: 12px; color: var(--text-3); margin-top: 6px;
    min-height: 20px;

</style>

<script>
  // ====== LOGIN SYSTEM ======
  const ACCESS_CODE = '9876';

  function initLogin() {
    // Check if already logged in this session
    if (sessionStorage.getItem('fg_auth') === 'true') {
      unlockDashboard();
      return;
    }
    const inputs = [0,1,2,3].map(i => document.getElementById('code' + i));
    inputs[0].focus();

    inputs.forEach((inp, i) => {
      inp.addEventListener('input', (e) => {
        // Allow only digits
        inp.value = inp.value.replace(/\D/g, '');
        if (inp.value && i < 3) inputs[i + 1].focus();
        // Clear error state
        inputs.forEach(el => el.classList.remove('error'));
        document.getElementById('loginHint').className = 'login-hint';
        document.getElementById('loginHint').textContent = 'Enter 4-digit access code';

        // Check if all 4 digits entered
        const code = inputs.map(el => el.value).join('');
        if (code.length === 4) {
          if (code === ACCESS_CODE) {
            sessionStorage.setItem('fg_auth', 'true');
            // Success animation
            inputs.forEach(el => { el.style.borderColor = 'var(--green)'; el.style.boxShadow = '0 0 0 3px rgba(52,211,153,0.2)'; });
            document.getElementById('loginHint').textContent = 'Access granted';
            document.getElementById('loginHint').style.color = 'var(--green)';
            setTimeout(unlockDashboard, 400);
          } else {
            inputs.forEach(el => el.classList.add('error'));
            document.getElementById('loginHint').className = 'login-hint error';
            document.getElementById('loginHint').textContent = 'Incorrect code';
            setTimeout(() => { inputs.forEach(el => { el.value = ''; el.classList.remove('error'); }); inputs[0].focus(); }, 800);
          }
        }
      });
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !inp.value && i > 0) {
          inputs[i - 1].focus();
          inputs[i - 1].value = '';
        }
      });
      // Handle paste
      inp.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasted = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 4);
        pasted.split('').forEach((ch, j) => { if (inputs[j]) inputs[j].value = ch; });
        if (pasted.length === 4) inputs[3].dispatchEvent(new Event('input'));
        else if (pasted.length > 0) inputs[Math.min(pasted.length, 3)].focus();
      });
    });
  }

  function unlockDashboard() {
    const loginScreen = document.getElementById('loginScreen');
    loginScreen.classList.add('hidden');

    document.getElementById('mainContainer').style.display = '';

    loadData(); // Start loading data after login
  }

  // ====== PLATFORM SELECTOR ======
  let selectedPlatform = null;

  function selectPlatform(platform) {
    selectedPlatform = platform;
    document.getElementById('filterPlatform').value = platform;
    document.getElementById('platformSelector').classList.remove('active');
    document.getElementById('platformSelector').style.display = 'none';
    document.getElementById('filtersBar').style.display = '';
    document.getElementById('dashboardContent').style.display = '';

    // Show platform badge

  function backToPlatforms() {

  function updatePlatformStats() {
    const source = liveData.length > 0 ? liveData : allData;
    // Recalculate scores so we can count boost-ready ads
    recalcScores(source);
    const platforms = {
      instagram: { el: 'igStats', ads: source.filter(d => d.publisher_platform === 'instagram') },
      tiktok: { el: 'ttStats', ads: source.filter(d => d.publisher_platform === 'tiktok') },

  const SUPABASE_URL = 'https://kulalbfnfugauwpjukze.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1bGFsYmZuZnVnYXV3cGp1a3plIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzM5NTQyMSwiZXhwIjoyMDg4OTcxNDIxfQ.QucqQ-nIqrkoRycB6RFjU3joknfSsn1HFJ7Sdk1mQgU';

  async function sbFetch(table, q = '') {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${q}`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message || `HTTP ${res.status}`); }
    return res.json();
  }

  let allData = [];       // Supabase historical data (for sparklines + snapshots)
  let liveData = [];       // Real-time data from Meta API
  let currentView = 'latest';

  // Detect the base URL for server endpoints (same origin as the page)
  const SERVER_BASE = window.location.origin;

  // ====== ABSOLUTE SCORING (CLIENT-SIDE) ======
  // Each ad scored independently — no comparison to other ads, no cap.
  // ====== TARGET-BASED SCORING (Variant B) ======
  // Score = 100 means on target. Each component capped at 2.0, max = 200 pts.
  const TARGETS = {
    awareness: { reach: 400000, cpm: 0.07, viewRate: 15 },
    engagement: { shareRate: 2.0, saveRate: 3.0, commentRate: 1.5, likeRate: 20.0 },
    traffic: { ctr: 1.0, cpc: 0.007, lpvr: 0.70, frequency: 2.0 }
  };

  function recalcScores(ads) {
    for (const d of ads) {
      if (d.campaign_type === 'awareness') {
        const reachR = Math.min(TARGETS.awareness.reach > 0 ? (d.reach||0) / TARGETS.awareness.reach : 0, 2.0);
        const cpmR = Math.min((d.cpm||0) > 0 ? TARGETS.awareness.cpm / d.cpm : 0, 2.0);
        const viewR = Math.min(TARGETS.awareness.viewRate > 0 ? (d.video_3s_view_rate||0) / TARGETS.awareness.viewRate : 0, 2.0);
        d._score = Math.round((0.40 * reachR + 0.40 * cpmR + 0.20 * viewR) * 100);
      } else if (d.campaign_type === 'engagement') {
        const reach1k = (d.reach||0) > 0 ? d.reach / 1000 : 0.001;
        const shareRate = (d.shares||0) / reach1k;
        const saveRate = (d.saves||0) / reach1k;
        const commentRate = (d.comments||0) / reach1k;
        const likeRate = (d.likes||0) / reach1k;
        const raw = 0.40 * Math.min(shareRate / TARGETS.engagement.shareRate, 2.0) +
                    0.30 * Math.min(saveRate / TARGETS.engagement.saveRate, 2.0) +
                    0.20 * Math.min(commentRate / TARGETS.engagement.commentRate, 2.0) +
                    0.10 * Math.min(likeRate / TARGETS.engagement.likeRate, 2.0);
        d._score = Math.round(raw * 100);
      } else if (d.campaign_type === 'traffic') {
        const ctrR = Math.min(TARGETS.traffic.ctr > 0 ? (d.ctr||0) / TARGETS.traffic.ctr : 0, 2.0);
        const cpc = (d.link_clicks||0) > 0 ? (d.spend||0) / d.link_clicks : 0;
        const cpcR = Math.min(cpc > 0 ? TARGETS.traffic.cpc / cpc : 0, 2.0);
        const lpvr = (d.link_clicks||0) > 0 ? (d.landing_page_views||0) / d.link_clicks : 0;
        const lpvrR = Math.min(TARGETS.traffic.lpvr > 0 ? lpvr / TARGETS.traffic.lpvr : 0, 2.0);
        const freqR = Math.min((d.frequency||0) > 0 ? TARGETS.traffic.frequency / d.frequency : 0, 2.0);
        d._score = Math.round((0.40 * ctrR + 0.30 * cpcR + 0.20 * lpvrR + 0.10 * freqR) * 100);
      } else {
        d._score = 0;
      }
      // Target-based boost thresholds: 100 = on target, max 200
      d._boost = d._score >= 100 ? 'boost' : d._score >= 70 ? 'monitor' : 'no boost';
    }
  }

  document.addEventListener('DOMContentLoaded', () => initLogin());

  // Fetch with timeout + retry (handles Render cold starts)
  async function fetchWithRetry(url, opts = {}, retries = 2, timeoutMs = 90000) {
    for (let attempt = 0; attempt <= retries; attempt++) {
      try {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        const res = await fetch(url, { ...opts, signal: controller.signal });
        clearTimeout(timer);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } catch (err) {
        if (attempt < retries) {
          console.warn(`Fetch attempt ${attempt + 1} failed for ${url}: ${err.message}, retrying...`);
          await new Promise(r => setTimeout(r, 2000));
        } else throw err;
      }
    }
  }

  async function loadData() {
    // Show loading state on platform selector subtitle
    const subEl = document.querySelector('.platform-selector-sub');
    if (subEl) subEl.innerHTML = '<div class="spinner" style="display:inline-block;width:14px;height:14px;margin-right:8px;vertical-align:middle;"></div> Loading ad data...';
    const el = document.getElementById('dashboardContent');
    try {
      // Step 1: Wake up the server with a lightweight health check (handles Render cold start)
      try {
        await fetchWithRetry(`${SERVER_BASE}/health`, {}, 1, 60000);
      } catch (e) { /* server might be slow but continue */ }

      el.innerHTML = '<div class="loading"><div class="spinner"></div> Loading ad data from Meta &amp; TikTok...</div>';

      // Step 2: Fetch live data and historical data in parallel
      const [liveRes, historicalData] = await Promise.all([
        fetchWithRetry(`${SERVER_BASE}/live`, {}, 2, 120000),
        sbFetch('ad_snapshots', 'select=*&order=captured_at.desc')
      ]);

      liveData = (liveRes.data || [])
        .filter(d => d.publisher_platform && d.publisher_platform !== 'unknown');
      allData = historicalData
        .filter(d => d.publisher_platform && d.publisher_platform !== 'unknown');

      populateFilters();
      updatePlatformStats();
      updateTimestamp();
      const subEl2 = document.querySelector('.platform-selector-sub');
      if (subEl2) subEl2.textContent = 'Select a platform to view campaign performance';
      // Don't auto-apply filters — wait for platform selection
    } catch (err) {
      // If live data fails, try showing historical data from Supabase only
      try {
        const historicalData = await sbFetch('ad_snapshots', 'select=*&order=captured_at.desc');
        allData = historicalData.filter(d => d.publisher_platform && d.publisher_platform !== 'unknown');
        if (allData.length > 0) {
          // Show the most recent snapshot as "live" data
          const latestTime = allData[0]?.captured_at;
          liveData = allData.filter(d => d.captured_at === latestTime);
          populateFilters();
          updatePlatformStats();
          updateTimestamp();
          return;
        }
      } catch (e) { /* supabase also failed */ }
      el.innerHTML = `<div class="empty"><h3>Failed to load</h3><p>${err.message}</p><p style="font-size:12px;color:var(--text-dim);">The server may be starting up. Please wait 30 seconds and click Refresh.</p></div>`;
    }
  }

  function updateTimestamp() {
    const el = document.getElementById('lastUpdated');
    if (currentView === 'latest' && liveData.length > 0) {
      el.textContent = `Live data \u2022 ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
    } else if (allData.length > 0) {
      const d = new Date(allData[0].captured_at);
      el.textContent = `Last capture: ${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
    }
  }

  function populateFilters() {
    const sel = document.getElementById('filterCampaign');
    // Combine live + historical campaigns for the dropdown
    const campaigns = [...new Set([...liveData, ...allData].map(d => d.campaign_name))];
    sel.innerHTML = '<option value="all">All Campaigns</option>';
    campaigns.forEach(c => {
      const o = document.createElement('option');
      o.value = c;
      o.textContent = c.length > 55 ? c.substring(0, 55) + '...' : c;
      sel.appendChild(o);
    });
  }

  function setView(v, el) {
    currentView = v;
    document.querySelectorAll('#viewPills .pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    applyFilters();
  }

  async function applyFilters() {
    const platform = document.getElementById('filterPlatform').value;
    const campaign = document.getElementById('filterCampaign').value;
    const sort = document.getElementById('filterSort').value;

    // Compare view: use live data for real-time comparison
    if (currentView === 'compare') {
      const sourceData = liveData.length > 0 ? liveData : allData;
      const latestMap = new Map();
      for (const d of sourceData) {
        const key = `${d.ad_name}__${d.publisher_platform}`;
        if (!latestMap.has(key) || new Date(d.captured_at) > new Date(latestMap.get(key).captured_at)) {
          latestMap.set(key, d);
        }
      }
      let all = [...latestMap.values()];
      if (campaign !== 'all') all = all.filter(d => d.campaign_name === campaign);

      renderCompare(all);
      return;
    }

    let filtered;

    if (currentView === 'latest') {
      // Use live data from Meta API (real-time)
      filtered = [...liveData];
      updateTimestamp();
    } else {
      // Time window: fetch snapshot from Supabase via server endpoint
      const hours = currentView;
      const content = document.getElementById('dashboardContent');
      content.innerHTML = `<div class="loading"><div class="spinner"></div> Loading ${hours}h snapshot...</div>`;

      try {
        const res = await fetch(`${SERVER_BASE}/snapshot/${hours}`);
        const json = await res.json();
        filtered = (json.data || []).filter(d => d.publisher_platform && d.publisher_platform !== 'unknown');

        // Update timestamp to show snapshot time
        const el = document.getElementById('lastUpdated');
        if (json.actual_time) {
          const d = new Date(json.actual_time);
          el.textContent = `Snapshot: ${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
        }
      } catch (err) {
        content.innerHTML = `<div class="empty"><h3>Failed to load snapshot</h3><p>${err.message}</p></div>`;
        return;
      }
    }

    // Apply platform + campaign filters
    filtered = filtered.filter(d => {
      if (platform !== 'all' && d.publisher_platform !== platform) return false;
      if (campaign !== 'all' && d.campaign_name !== campaign) return false;
      return true;
    });

    // Recalculate scores client-side (0-100 normalized)
    recalcScores(filtered);

    const awareness = filtered.filter(d => d.campaign_type === 'awareness');
    const engagement = filtered.filter(d => d.campaign_type === 'engagement');
    const traffic = filtered.filter(d => d.campaign_type === 'traffic');

    sortAds(awareness, sort);
    sortAds(engagement, sort);
    sortAds(traffic, sort);

    render(awareness, engagement, traffic);
  }

  function sortAds(arr, sort) {
    arr.sort((a, b) => {
      // Budget-spent ads always go last, NEW ads go first
      const aPriority = a.ad_status === 'COMPLETED' ? 3 : a.ad_status === 'PAUSED' ? 2 : a.ad_status === 'NEW' ? 0 : 1;
      const bPriority = b.ad_status === 'COMPLETED' ? 3 : b.ad_status === 'PAUSED' ? 2 : b.ad_status === 'NEW' ? 0 : 1;
      if (aPriority !== bPriority) return aPriority - bPriority;

      const sa = a._score ?? -1;
      const sb = b._score ?? -1;
      switch(sort) {
        case 'score_asc': return sa - sb;
        case 'reach_desc': return (b.reach||0) - (a.reach||0);
        case 'impressions_desc': return (b.impressions||0) - (a.impressions||0);
        default: return sb - sa;
      }
    });
  }

  // ====== PLATFORM-SPECIFIC NAMING ======
  // TikTok uses different campaign type names than Meta
  function getCampaignLabel(type) {
    const isTikTok = selectedPlatform === 'tiktok';
    const isAll = selectedPlatform === 'all';
    const labels = {
      awareness: {
        title: isTikTok ? 'Reach Campaigns' : isAll ? 'Awareness / Reach Campaigns' : 'Awareness Campaigns',
        sub: 'Entertaining content'
      },
      engagement: {
        title: isTikTok ? 'Community Campaigns' : isAll ? 'Engagement / Community Campaigns' : 'Engagement Campaigns',
        sub: 'Educational content'
      },
      traffic: { title: 'Traffic Campaigns', sub: 'Link click driven' }
    };
    return labels[type] || { title: type, sub: '' };
  }

  // Platform-specific metric labels
  function getViewRateLabel() {
    return selectedPlatform === 'tiktok' ? '2s View Rate' : '3s View Rate';
  }
  function getSavesLabel() {
    return selectedPlatform === 'tiktok' ? 'Favorites' : 'Saves';
  }

  // ====== RENDER ======
  function render(awareness, engagement, traffic) {
    const c = document.getElementById('dashboardContent');
    let h = '';

    const awarenessLabel = getCampaignLabel('awareness');
    const engagementLabel = getCampaignLabel('engagement');
    const trafficLabel = getCampaignLabel('traffic');
    const viewRateLabel = getViewRateLabel();
    const savesLabel = getSavesLabel();

    // Awareness / Reach — only scoring KPIs: Reach, CPM, View Rate + Spend
    h += buildSection({
      type: 'awareness', title: awarenessLabel.title, sub: awarenessLabel.sub,
      iconClass: 'icon-awareness', icon: '\u25C9',
      formula: [['Reach','40%'],['CPM','40% inv'],[viewRateLabel,'20%']],
      chipClass: 'chip-blue', ads: awareness, scoreKey: 'awareness_score',
      metrics: d => [
        ['Reach', fmt(d.reach)], ['CPM', '\u20ac'+(d.cpm||0).toFixed(3)],
        [viewRateLabel, (d.video_3s_view_rate||0).toFixed(1)+'%'], ['Spend', '\u20ac'+(d.spend||0).toFixed(2)]
      ],
      summaryExtras: ads => []
    });

    // Engagement / Community — only scoring KPIs: Shares, Saves/Favorites, Comments, Likes + Spend
    h += buildSection({
      type: 'engagement', title: engagementLabel.title, sub: engagementLabel.sub,
      iconClass: 'icon-engagement', icon: '\u2665',
      formula: [['Share Rate','40%'],[savesLabel + ' Rate','30%'],['Comment Rate','20%'],['Like Rate','10%']],
      chipClass: 'chip-purple', ads: engagement, scoreKey: 'engagement_score',
      metrics: d => [
        ['Shares', fmt(d.shares)], [savesLabel, fmt(d.saves)],
        ['Comments', fmt(d.comments)], ['Likes', fmt(d.likes)],
        ['Spend', '\u20ac'+(d.spend||0).toFixed(2)]
      ],
      summaryExtras: ads => []
    });

    // Traffic — only scoring KPIs: Link Clicks, CTR, CPC, LPVR, Frequency + Spend
    h += buildSection({
      type: 'traffic', title: trafficLabel.title, sub: trafficLabel.sub,
      iconClass: 'icon-traffic', icon: '\u2197',
      formula: [['CTR','40%'],['CPC','30% inv'],['LPVR','20%'],['Frequency','10% inv']],
      chipClass: 'chip-green', ads: traffic, scoreKey: 'traffic_score',
      metrics: d => {
        const cpc = (d.link_clicks||0) > 0 ? d.spend / d.link_clicks : (d.cost_per_click||0);
        const lpvr = (d.link_clicks||0) > 0 ? ((d.landing_page_views||0) / d.link_clicks * 100) : 0;
        return [
          ['Link Clicks', fmt(d.link_clicks)], ['CTR', (d.ctr||0).toFixed(2)+'%'],
          ['CPC', '\u20ac'+(cpc).toFixed(3)], ['LPVR', lpvr.toFixed(1)+'%'],
          ['Frequency', (d.frequency||0).toFixed(1)], ['Spend', '\u20ac'+(d.spend||0).toFixed(2)]
        ];
      },
      summaryExtras: ads => []
    });

    c.innerHTML = h;
  }

  function buildSection({type, title, sub, iconClass, icon, formula, chipClass, ads, scoreKey, metrics, summaryExtras}) {
    let h = `<div class="section">`;

    // Count live vs completed vs new ads
    const liveCount = ads.filter(d => d.ad_status === 'ACTIVE').length;
    const budgetSpentCount = ads.filter(d => d.ad_status === 'COMPLETED').length;

    const newCount = ads.filter(d => d.ad_status === 'NEW').length;

    let countParts = [];

    if (newCount > 0) countParts.push(newCount + ' new');

    h += `</div>`;

    if (ads.length === 0) {
      h += `<div class="empty"><h3>No ${type} ads found</h3><p>No data for current filters.</p></div></div>`;
      return h;
    }

    // Summary — only 4 blocks, TBD until scoring formula is finalized
    h += `<div class="summary" style="grid-template-columns: repeat(4, 1fr);">`;
    h += `<div class="summary-card"><div class="summary-label">Avg Score</div><div class="summary-value" style="color:var(--text-3)">TBD</div></div>`;
    h += `<div class="summary-card"><div class="summary-label">Boost</div><div class="summary-value" style="color:var(--text-3)">TBD</div></div>`;
    h += `<div class="summary-card"><div class="summary-label">Monitor</div><div class="summary-value" style="color:var(--text-3)">TBD</div></div>`;
    h += `<div class="summary-card"><div class="summary-label">No Boost</div><div class="summary-value" style="color:var(--text-3)">TBD</div></div>`;
    h += `</div>`;

    // Ad cards
    const topScore = ads.length > 0 ? Math.max(...ads.map(d => d._score || 0)) : 0;

    h += `<div class="ad-grid">`;
    ads.forEach((d, i) => {
      const score = d._score || 0;
      const isWinner = score === topScore && ads.length > 1 && score > 0;
      const m = metrics(d);
      const platClass = 'plat-' + (d.publisher_platform || 'unknown');
      const platLabel = cap(d.publisher_platform || 'unknown');
      const hasThumb = d.thumbnail_url && d.thumbnail_url.startsWith('http');

      // Determine ad status — uses Meta's effective_status directly
      const adStatus = d.ad_status || 'UNKNOWN';
      const isLive = adStatus === 'ACTIVE';
      const isPaused = adStatus === 'PAUSED';
      const isCompleted = adStatus === 'COMPLETED';
      const isPending = adStatus === 'PENDING';

      const statusClass = isCompleted ? 'status-budget-spent' : isNew ? 'status-new' : isLive ? 'status-live' : isPaused ? 'status-paused' : isPending ? 'status-new' : 'status-ended';

    h += `</div>`;

  // ====== SPARKLINE ======
  // Collects all snapshots for a given ad+platform across time, sorted chronologically
  // Uses historical Supabase data + current live data point for the trend line
  function getSparklineData(ad) {
    const historical = allData
      .filter(d => d.ad_name === ad.ad_name && d.publisher_platform === ad.publisher_platform)
      .sort((a, b) => new Date(a.captured_at) - new Date(b.captured_at));

    // If we're on live view, append the current live data point so sparkline shows up-to-now
    if (currentView === 'latest' && liveData.length > 0) {
      const livePoint = liveData.find(d => d.ad_name === ad.ad_name && d.publisher_platform === ad.publisher_platform);
      if (livePoint) {
        // Avoid duplicate if the last historical point is very recent
        const lastHistorical = historical[historical.length - 1];
        if (!lastHistorical || Math.abs(new Date(lastHistorical.captured_at) - new Date(livePoint.captured_at)) > 60000) {
          historical.push(livePoint);
        }
      }
    }
    return historical;
  }

  // Picks the metric to chart based on campaign type
  function sparklineMetric(d) {
    if (d.campaign_type === 'awareness') return d.reach || 0;
    if (d.campaign_type === 'traffic') return d.link_clicks || 0;
    return (d.shares || 0) + (d.saves || 0) + (d.comments || 0) + (d.likes || 0);
  }

  function sparklineLabel(d) {
    return 'Momentum Tracker';
  }

  // Builds an inline SVG sparkline from an array of numeric values
  function buildSparklineSVG(values, color) {
    const w = 260, h = 32, pad = 2;
    if (values.length < 2) return '';
    const min = Math.min(...values), max = Math.max(...values);
    const range = max - min || 1;
    const points = values.map((v, i) => {
      const x = pad + (i / (values.length - 1)) * (w - pad * 2);
      const y = pad + (1 - (v - min) / range) * (h - pad * 2);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    });
    // Gradient fill under the line
    const fillPoints = [
      `${pad},${h}`,
      ...points,
      `${(w - pad).toFixed(1)},${h}`
    ].join(' ');
    return `<svg class="sparkline-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <defs><linearGradient id="sg_${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
      </linearGradient></defs>
      <polygon points="${fillPoints}" fill="url(#sg_${color.replace('#','')})" />
      <polyline points="${points.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${points[points.length-1].split(',')[0]}" cy="${points[points.length-1].split(',')[1]}" r="2.5" fill="${color}"/>
    </svg>`;
  }

  // Builds the full sparkline card section
  function buildSparkline(ad) {
    const history = getSparklineData(ad);
    const values = history.map(d => sparklineMetric(d));
    const label = sparklineLabel(ad);
    const color = ad.campaign_type === 'awareness' ? '#53B7E8' : ad.campaign_type === 'traffic' ? '#34D399' : '#A855F7';

    let h = `<div class="sparkline-wrap">`;
    h += `<div class="sparkline-header">`;
    h += `<span class="sparkline-title">${label}</span>`;

    if (values.length >= 2) {
      const first = values[0], last = values[values.length - 1];
      const pctChange = first > 0 ? ((last - first) / first * 100) : 0;
      const arrow = pctChange > 0 ? '\u2191' : pctChange < 0 ? '\u2193' : '\u2192';
      const cls = pctChange > 0 ? 'up' : pctChange < 0 ? 'down' : 'flat';
      h += `<span class="sparkline-trend ${cls}">${arrow} ${Math.abs(pctChange).toFixed(0)}%</span>`;
    }

    h += `</div>`;

    if (values.length >= 2) {
      h += buildSparklineSVG(values, color);
    } else {
      h += `<div class="sparkline-empty">Trend available after 2+ captures</div>`;
    }

    h += `</div>`;
    return h;
  }

  // ====== TOGGLE COMPLETED ADS ======
  let hideCompleted = true; // Default: hide completed ads, show only live
  function toggleCompleted(btn) {
    hideCompleted = !hideCompleted;
    btn.classList.toggle('active', hideCompleted);

  // ====== HELPERS ======
  function fmt(n) {
    if (n == null) return '0';
    if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
    if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
    return n.toLocaleString();
  }
  function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
  function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
  function clientHourLabel(hours) {
    const ord = ["First","Second","Third","Fourth","Fifth","Sixth","Seventh","Eighth","Ninth","Tenth","Eleventh","Twelfth"];
    if (hours == null || hours < 0) return "Launch";
    if (hours <= 12) return ord[Math.min(11, Math.floor(hours))] + " hour";
    return (Math.ceil(hours / 24) * 24) + " hours";
  }
  // Sequential label based on snapshot position (index), not stored snapshot_hours
  function sequentialHourLabel(index, totalSnaps) {
    const ord = ["First","Second","Third","Fourth","Fifth","Sixth","Seventh","Eighth","Ninth","Tenth","Eleventh","Twelfth"];
    if (index < 12) return ord[index] + " hour";
    return (Math.ceil((index + 1) / 24) * 24) + " hours";
  }
  function sColor(s) {
    if (s >= 100) return 'var(--green)';
    if (s >= 70) return 'var(--orange)';
    return 'var(--red)';
  }

  function renderHistory(data, adName, platform) {
    const overlay = document.getElementById('historyOverlay');
    const snaps = data.snapshots || [];
    const tracking = data.tracking;

    let h = `<div class="history-container">`;
    h += `<div class="history-header">`;
    h += `<div><div class="history-title">${esc(adName)}</div>`;
    h += `<div style="font-size:11px; color:var(--text-3); margin-top:2px;">${cap(platform)} &middot; ${snaps.length} snapshots captured</div></div>`;
    h += `<button class="history-close" onclick="closeHistory()">&times;</button>`;
    h += `</div>`;

    if (snaps.length === 0) {
      h += `<div class="history-empty">`;
      h += `<div class="history-empty-icon">&#128247;</div>`;
      h += `<div style="font-size:15px; font-weight:600; margin-bottom:8px;">No snapshots yet</div>`;
      h += `<div style="font-size:13px; max-width:360px; margin:0 auto;">Snapshots are captured automatically once this ad starts delivering. The first snapshot will appear within 30-60 minutes of the ad going live.</div>`;
      if (tracking) {
        h += `<div style="font-size:11px; margin-top:12px; color:var(--text-3);">Tracking since ${new Date(tracking.first_seen_active).toLocaleString()}</div>`;
      }
      h += `</div>`;
      h += `</div>`;
      overlay.innerHTML = h;
      return;
    }

    // Compute deltas from first to last snapshot
    const first = snaps[0];
    const last = snaps[snaps.length - 1];
    const reachGrowth = last.reach - first.reach;
    const spendGrowth = last.spend - first.spend;
    const clicksGrowth = last.link_clicks - first.link_clicks;
    const timeSpanH = ((new Date(last.captured_at) - new Date(first.captured_at)) / 3600000).toFixed(1);

    // KPI cards
    h += `<div class="history-kpis">`;
    const kpis = [
      ['Current Reach', fmt(last.reach), reachGrowth > 0 ? '+'+fmt(reachGrowth) : '—', 'var(--blue)'],
      ['Current Spend', '\u20ac'+(last.spend||0).toFixed(2), spendGrowth > 0 ? '+\u20ac'+spendGrowth.toFixed(2) : '—', 'var(--text-1)'],
      ['Link Clicks', fmt(last.link_clicks), clicksGrowth > 0 ? '+'+fmt(clicksGrowth) : '—', 'var(--green)'],
      ['Time Tracked', timeSpanH + 'h', snaps.length + ' snapshots', 'var(--orange)']
    ];
    kpis.forEach(([label, value, delta, color]) => {
      h += `<div class="history-kpi">`;
      h += `<div class="history-kpi-label">${label}</div>`;
      h += `<div class="history-kpi-value" style="color:${color}">${value}</div>`;
      h += `<div class="history-kpi-delta" style="color:var(--text-3)">${delta}</div>`;
      h += `</div>`;
    });
    h += `</div>`;

    // Charts
    h += `<div class="history-charts-grid">`;
    h += `<div class="history-chart-box"><div class="history-chart-title">Reach Over Time <span style="font-size:10px;color:var(--text-3);font-weight:400;">(CET)</span></div><canvas id="histReach" height="180"></canvas></div>`;
    h += `<div class="history-chart-box"><div class="history-chart-title">Spend Over Time <span style="font-size:10px;color:var(--text-3);font-weight:400;">(CET)</span></div><canvas id="histSpend" height="180"></canvas></div>`;
    h += `<div class="history-chart-box"><div class="history-chart-title">CTR Over Time <span style="font-size:10px;color:var(--text-3);font-weight:400;">(CET)</span></div><canvas id="histCTR" height="180"></canvas></div>`;
    h += `<div class="history-chart-box"><div class="history-chart-title">CPM Over Time <span style="font-size:10px;color:var(--text-3);font-weight:400;">(CET)</span></div><canvas id="histCPM" height="180"></canvas></div>`;
    h += `</div>`;

    // Engagement chart (full width)
    h += `<div class="history-chart-box"><div class="history-chart-title">Engagement Over Time <span style="font-size:10px;color:var(--text-3);font-weight:400;">(CET)</span></div><canvas id="histEngagement" height="160"></canvas></div>`;

    // Snapshot table
    h += `<div class="history-chart-box">`;
    h += `<div class="history-chart-title">Snapshot Log</div>`;
    h += `<div style="max-height:280px; overflow-y:auto;">`;
    h += `<table class="history-snapshots-table">`;
    h += `<tr><th>Period</th><th>Reach</th><th>Impressions</th><th>Spend</th><th>CTR</th><th>CPM</th><th>Clicks</th><th>Score</th></tr>`;
    snaps.forEach((s, idx) => {
      // Use sequential position for hourly snapshots to avoid gaps from GH Actions timing
      const label = (s.snapshot_hours != null && s.snapshot_hours <= 12) ? sequentialHourLabel(idx) : clientHourLabel(s.snapshot_hours);
      const score = s.awareness_score ?? s.engagement_score ?? s.traffic_score ?? '—';
      h += `<tr>`;
      h += `<td style="font-weight:600; color:var(--text-1);">${label}</td>`;
      h += `<td>${fmt(s.reach)}</td>`;
      h += `<td>${fmt(s.impressions)}</td>`;
      h += `<td>\u20ac${(s.spend||0).toFixed(2)}</td>`;
      h += `<td>${(s.ctr||0).toFixed(2)}%</td>`;
      h += `<td>\u20ac${(s.cpm||0).toFixed(3)}</td>`;
      h += `<td>${fmt(s.link_clicks)}</td>`;
      h += `<td>${score}</td>`;
      h += `</tr>`;
    });
    h += `</table></div></div>`;

    h += `</div>`; // close history-container
    overlay.innerHTML = h;

    // Render charts
    setTimeout(() => renderHistoryCharts(snaps), 50);
  }

  function renderHistoryCharts(snaps) {
    const labels = snaps.map((s, idx) => (s.snapshot_hours != null && s.snapshot_hours <= 12) ? sequentialHourLabel(idx) : clientHourLabel(s.snapshot_hours));

    const chartOpts = (color) => ({
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#1B2235' }, ticks: { color: '#5B6A85', font: { size: 9 }, maxRotation: 45 } },
        y: { grid: { color: '#1B2235' }, ticks: { color: '#5B6A85', font: { size: 10 } } }
      },
      elements: {
        point: { radius: 3, hoverRadius: 5, backgroundColor: color },
        line: { tension: 0.3, borderWidth: 2 }
      }
    });

    // Reach
    const reachCtx = document.getElementById('histReach');
    if (reachCtx) {
      new Chart(reachCtx, {
        type: 'line',
        data: { labels, datasets: [{ data: snaps.map(s => s.reach), borderColor: '#53B7E8', backgroundColor: 'rgba(83,183,232,0.1)', fill: true }] },
        options: chartOpts('#53B7E8')
      });
    }

    // Spend
    const spendCtx = document.getElementById('histSpend');
    if (spendCtx) {
      new Chart(spendCtx, {
        type: 'line',
        data: { labels, datasets: [{ data: snaps.map(s => s.spend), borderColor: '#FBBF24', backgroundColor: 'rgba(251,191,36,0.1)', fill: true }] },
        options: chartOpts('#FBBF24')
      });
    }

    // CTR
    const ctrCtx = document.getElementById('histCTR');
    if (ctrCtx) {
      new Chart(ctrCtx, {
        type: 'line',
        data: { labels, datasets: [{ data: snaps.map(s => s.ctr), borderColor: '#34D399', backgroundColor: 'rgba(52,211,153,0.1)', fill: true }] },
        options: chartOpts('#34D399')
      });
    }

    // CPM
    const cpmCtx = document.getElementById('histCPM');
    if (cpmCtx) {
      new Chart(cpmCtx, {
        type: 'line',
        data: { labels, datasets: [{ data: snaps.map(s => s.cpm), borderColor: '#A855F7', backgroundColor: 'rgba(168,85,247,0.1)', fill: true }] },
        options: chartOpts('#A855F7')
      });
    }

    // Engagement (multi-line)
    const engCtx = document.getElementById('histEngagement');
    if (engCtx) {
      new Chart(engCtx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label: 'Likes', data: snaps.map(s => s.likes), borderColor: '#F87171', borderWidth: 2, tension: 0.3, pointRadius: 2 },
            { label: 'Shares', data: snaps.map(s => s.shares), borderColor: '#53B7E8', borderWidth: 2, tension: 0.3, pointRadius: 2 },
            { label: 'Saves', data: snaps.map(s => s.saves), borderColor: '#34D399', borderWidth: 2, tension: 0.3, pointRadius: 2 },
            { label: 'Comments', data: snaps.map(s => s.comments), borderColor: '#FBBF24', borderWidth: 2, tension: 0.3, pointRadius: 2 }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { position: 'bottom', labels: { color: '#95A1BA', font: { size: 10 }, padding: 12, usePointStyle: true } } },
          scales: {
            x: { grid: { color: '#1B2235' }, ticks: { color: '#5B6A85', font: { size: 9 }, maxRotation: 45 } },
            y: { grid: { color: '#1B2235' }, ticks: { color: '#5B6A85', font: { size: 10 } } }
          }
        }
      });
    }

        h += `<div class="report-metrics-row">`;
        sec.metrics.forEach(m => {
          const trendClass = m.trend === 'up' ? 'trend-up' : m.trend === 'down' ? 'trend-down' : 'trend-neutral';
          const trendIcon = m.trend === 'up' ? '&#9650;' : m.trend === 'down' ? '&#9660;' : '&#9654;';
          h += `<div class="report-metric-card">`;
          h += `<div class="report-metric-label">${esc(m.label)}</div>`;
          h += `<div class="report-metric-value">${esc(m.value)}</div>`;
          h += `<div class="report-metric-trend ${trendClass}">${trendIcon} ${esc(m.trend || 'neutral')}</div>`;
          h += `</div>`;
        });
        h += `</div>`;
      }
      h += `</div>`;
    });

    // Platform Comparison
    if (report.platformComparison) {
      const pc = report.platformComparison;
      h += `<div class="report-section">`;
      h += `<div class="report-section-title">&#127760; Platform Comparison</div>`;
      h += `<div class="report-section-content">${esc(pc.summary || '')}</div>`;
      h += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">`;
      if (pc.instagram) {
        h += `<div style="padding:14px; background:var(--bg-1); border-radius:var(--radius-xs); border:1px solid var(--border);">`;
        h += `<div style="font-weight:600; color:#E1306C; margin-bottom:6px;">Instagram</div>`;
        h += `<div style="font-size:12px; color:var(--text-2);">&#10003; ${esc(pc.instagram.strength || '')}</div>`;
        h += `<div style="font-size:12px; color:var(--text-3); margin-top:4px;">&#9888; ${esc(pc.instagram.weakness || '')}</div>`;
        h += `</div>`;
      }
      if (pc.facebook) {
        h += `<div style="padding:14px; background:var(--bg-1); border-radius:var(--radius-xs); border:1px solid var(--border);">`;
        h += `<div style="font-weight:600; color:#1877F2; margin-bottom:6px;">Facebook</div>`;
        h += `<div style="font-size:12px; color:var(--text-2);">&#10003; ${esc(pc.facebook.strength || '')}</div>`;
        h += `<div style="font-size:12px; color:var(--text-3); margin-top:4px;">&#9888; ${esc(pc.facebook.weakness || '')}</div>`;
        h += `</div>`;
      }
      h += `</div></div>`;
    }

    // Recommendations
    if (report.recommendations && report.recommendations.length) {
      h += `<div style="margin-bottom:24px;">`;
      h += `<div style="font-size:15px; font-weight:700; margin-bottom:12px;">&#128161; Recommendations</div>`;
      report.recommendations.forEach(rec => {
        const pClass = rec.priority === 'high' ? 'priority-high' : rec.priority === 'medium' ? 'priority-medium' : 'priority-low';
        h += `<div class="report-rec">`;
        h += `<span class="report-rec-priority ${pClass}">${esc(rec.priority)}</span>`;
        h += `<div><div class="report-rec-text">${esc(rec.action)}</div>`;
        if (rec.reason) h += `<div class="report-rec-reason">${esc(rec.reason)}</div>`;
        h += `</div></div>`;
      });
      h += `</div>`;
    }

    // Footer
    h += `<div style="text-align:center; padding-top:16px; border-top:1px solid var(--border); font-size:11px; color:var(--text-3);">`;
    h += `Generated by FibreGuard Ad Intelligence &middot; ${new Date().toLocaleDateString()}`;
    h += `</div>`;

    h += `</div>`; // close report-container
    overlay.innerHTML = h;

    // Render charts after DOM update
    setTimeout(() => renderReportCharts(cd), 50);
  }

  function renderReportCharts(cd) {
    // Spend by Type (Doughnut)
    const spendCtx = document.getElementById('chartSpendByType');
    if (spendCtx && cd.spendByType) {
      new Chart(spendCtx, {
        type: 'doughnut',
        data: {
          labels: cd.spendByType.map(d => d.label),
          datasets: [{
            data: cd.spendByType.map(d => d.value),
            backgroundColor: ['#53B7E8', '#A855F7', '#34D399'],
            borderColor: '#121722',
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'bottom', labels: { color: '#95A1BA', font: { size: 11 }, padding: 16 } }
          }
        }
      });
    }

    // Top Ads (Horizontal Bar)
    const topCtx = document.getElementById('chartTopAds');
    if (topCtx && cd.topAdsScores) {
      const typeColors = { awareness: '#53B7E8', engagement: '#A855F7', traffic: '#34D399' };
      new Chart(topCtx, {
        type: 'bar',
        data: {
          labels: cd.topAdsScores.map(d => d.name),
          datasets: [{
            data: cd.topAdsScores.map(d => d.score),
            backgroundColor: cd.topAdsScores.map(d => typeColors[d.type] || '#53B7E8'),
            borderRadius: 4,
            barThickness: 18
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: '#1B2235' }, ticks: { color: '#5B6A85', font: { size: 10 } } },
            y: { grid: { display: false }, ticks: { color: '#95A1BA', font: { size: 10 } } }
          }
        }
      });
    }
  }
</script>

<!-- History Modal Overlay -->
<div class="history-overlay" id="historyOverlay"></div>

<!-- Report Modal Overlay -->
<div class="report-overlay" id="reportOverlay"></div>

<!-- Score Info Overlay -->
<div class="score-info-overlay" id="scoreInfoOverlay" onclick="if(event.target===this)closeScoreInfo()"></div>

</body>
</html>
