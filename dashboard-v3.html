        } else {
          b.style.background = 'var(--orange-10)';
          b.style.borderColor = 'rgba(251,191,36,0.20)';
          b.style.color = 'var(--orange)';
        }
        break;
      }
    }
  }

  // Bucket definitions — mirror scoring.js exactly so absolute-quality uses the same metric set as the peer score
  const COMPARE_BUCKETS = {
    'tiktok__reach': {
      metrics: [
        { name: 'reach', label: 'Reach',   source: r => Number(r.reach) || 0,                     weight: 0.40, invert: false },
        { name: 'cpm',   label: 'CPM',     source: r => Number(r.cpm) || 0,                       weight: 0.40, invert: true  },
        { name: 'view2s',label: '2s view', source: r => {
            const v = parseFloat(r.video_2s_view_rate);
            if (!isNaN(v) && v > 0) return v;
            const imp = Number(r.impressions) || 0;
            const v2  = Number(r.video_2s_views) || 0;
            return (imp > 0 && v2 > 0) ? (v2 / imp) * 100 : 0;
          }, weight: 0.20, invert: false }
      ],
      usesRates: false
    },
    'instagram__awareness': {
      metrics: [
        { name: 'reach', label: 'Reach',   source: r => Number(r.reach) || 0,                     weight: 0.40, invert: false },
        { name: 'cpm',   label: 'CPM',     source: r => Number(r.cpm) || 0,                       weight: 0.40, invert: true  },
        { name: 'view3s',label: '3s view', source: r => {
            const v = parseFloat(r.video_3s_view_rate);
            if (!isNaN(v) && v > 0) return v;
            const imp = Number(r.impressions) || 0;
            const v3  = Number(r.video_3s_views) || 0;
            return (imp > 0 && v3 > 0) ? (v3 / imp) * 100 : 0;
          }, weight: 0.20, invert: false }
      ],
      usesRates: false
    },
    'tiktok__community': {
      metrics: [
        { name: 'share',   label: 'Share rate',     source: r => (Number(r.impressions)||0) > 0 ? (Number(r.shares)||0)/Number(r.impressions)*1000 : 0, weight: 0.40, invert: false },
        { name: 'fav',     label: 'Favourite rate', source: r => (Number(r.impressions)||0) > 0 ? (Number(r.saves)||0)/Number(r.impressions)*1000 : 0,  weight: 0.30, invert: false },
        { name: 'comment', label: 'Comment rate',   source: r => (Number(r.impressions)||0) > 0 ? (Number(r.comments)||0)/Number(r.impressions)*1000 : 0, weight: 0.20, invert: false },
        { name: 'like',    label: 'Like rate',      source: r => (Number(r.impressions)||0) > 0 ? (Number(r.likes)||0)/Number(r.impressions)*1000 : 0,    weight: 0.10, invert: false }
      ],
      usesRates: true
    },
    'instagram__engagement': {
      metrics: [
        { name: 'share',   label: 'Share rate',   source: r => (Number(r.impressions)||0) > 0 ? (Number(r.shares)||0)/Number(r.impressions)*1000 : 0,   weight: 0.40, invert: false },
        { name: 'save',    label: 'Save rate',    source: r => (Number(r.impressions)||0) > 0 ? (Number(r.saves)||0)/Number(r.impressions)*1000 : 0,    weight: 0.30, invert: false },
        { name: 'comment', label: 'Comment rate', source: r => (Number(r.impressions)||0) > 0 ? (Number(r.comments)||0)/Number(r.impressions)*1000 : 0, weight: 0.20, invert: false },
        { name: 'like',    label: 'Like rate',    source: r => (Number(r.impressions)||0) > 0 ? (Number(r.likes)||0)/Number(r.impressions)*1000 : 0,    weight: 0.10, invert: false }
      ],
      usesRates: true
    }
  };

  function _bucketKeyFor(d) {
    const p = (d.publisher_platform || '').toLowerCase();
    let c = (d.campaign_type || '').toLowerCase();
    // Treat TikTok 'reach' the same as 'tiktok__reach' bucket — the peer scorer does this too
    return `${p}__${c}`;
  }

  // Build 90-day historical distributions per bucket × metric.
  // Cached; rebuilt only if data set or window has changed.
  function buildCompareBucketHistory(allDataArray) {
    const NINETY_DAYS_MS = 90 * 24 * 60 * 60 * 1000;
    const cutoff = Date.now() - NINETY_DAYS_MS;
    const data = (allDataArray || []).filter(d => d.captured_at && new Date(d.captured_at).getTime() >= cutoff);

    const history = {};
    for (const d of data) {
      const key = _bucketKeyFor(d);
      const bucket = COMPARE_BUCKETS[key];
      if (!bucket) continue;
      // Skip rows that can't compute rates
      if (bucket.usesRates) {
        const imp = Number(d.impressions) || 0;
        if (imp === 0) continue;
      }
      if (!history[key]) history[key] = {};
      for (const metric of bucket.metrics) {
        const v = metric.source(d);
        if (typeof v !== 'number' || !Number.isFinite(v)) continue;
        if (!history[key][metric.name]) history[key][metric.name] = [];
        history[key][metric.name].push(v);
      }
    }
    // Sort each metric array ascending for fast percentile rank
    for (const k of Object.keys(history)) {
      for (const m of Object.keys(history[k])) {
        history[k][m].sort((a,b) => a - b);
      }
    }
    return history;
  }

  function _binarySearchInsertIdx(sortedArr, value) {
    let lo = 0, hi = sortedArr.length;
    while (lo < hi) {
      const mid = (lo + hi) >>> 1;
      if (sortedArr[mid] < value) lo = mid + 1;
      else hi = mid;
    }
    return lo;
  }

  function _historicalPercentileRank(sortedArr, value) {
    if (!sortedArr || sortedArr.length === 0) return null;
    if (sortedArr.length === 1) return 50;
    const idxBelow = _binarySearchInsertIdx(sortedArr, value);
    let equal = 0, scan = idxBelow;
    while (scan < sortedArr.length && sortedArr[scan] === value) { equal++; scan++; }
    return ((idxBelow + 0.5 * equal) / sortedArr.length) * 100;
  }

  // Returns { quality: 0-100|null, breakdown: [{label, pct, invert}], state: 'strong'|'ok'|'weak'|'unknown' }
  function computeAbsoluteQuality(d, history) {
    const key = _bucketKeyFor(d);
    const bucket = COMPARE_BUCKETS[key];
    if (!bucket || !history[key]) return { quality: null, breakdown: [], state: 'unknown' };

    let totalWeight = 0;
    let weighted = 0;
    const breakdown = [];

    for (const metric of bucket.metrics) {
      const sortedHist = history[key][metric.name];
      if (!sortedHist || sortedHist.length < 5) continue;  // need enough peers in history
      const value = metric.source(d);
      if (typeof value !== 'number' || !Number.isFinite(value)) continue;

      let rank = _historicalPercentileRank(sortedHist, value);
      if (rank == null) continue;
      // For inverted metrics (CPM): lower is better → flip
      if (metric.invert) rank = 100 - rank;

      weighted += rank * metric.weight;
      totalWeight += metric.weight;
      breakdown.push({ label: metric.label, pct: Math.round(rank), invert: metric.invert });
    }

    if (totalWeight === 0) return { quality: null, breakdown: [], state: 'unknown' };
    const quality = Math.round(weighted / totalWeight);
    let state = 'weak';
    if (quality >= 75) state = 'strong';
    else if (quality >= 40) state = 'ok';
    return { quality, breakdown, state };
  }

  // Y-axis metric registry — easy to extend later
  // `usesAbsoluteQuality: true` means the value is already a 0-100 score (no peer-percentile re-rank)
  const COMPARE_Y_METRICS = {
    quality:   {
      label: 'Overall quality (0–100)',
      getValue: d => (d._aqQuality != null ? d._aqQuality : 50),
      usesAbsoluteQuality: true,
      quadrants: { tr: 'Best all-round creatives', tl: 'High quality, weaker peer rank', br: 'Strong rank, mixed quality', bl: 'Underperforming all round' }
    },
    reach:     {
      label: 'Reach percentile',
      getValue: d => d.reach || 0,
      quadrants: { tr: 'Best scale candidates', tl: 'High reach, weaker peer rank', br: 'Strong rank, room to scale', bl: 'Low priority' }
    },
    view_rate: {
      label: 'Video view rate percentile',
      getValue: d => {
        const p = (d.publisher_platform || '').toLowerCase();
        return p === 'tiktok' ? (d.video_2s_view_rate || 0) : (d.video_3s_view_rate || 0);
      },
      quadrants: { tr: 'Strongest creatives', tl: 'Engaging hook, weaker peer rank', br: 'Strong rank, weaker hook', bl: 'Underperforming' }
    },
    cpm:       {
      label: 'CPM percentile (lower = higher)',
      getValue: d => -(d.cpm || 0),
      quadrants: { tr: 'Cheap & top-ranked', tl: 'Cheap impressions, weaker rank', br: 'Top-ranked but pricey', bl: 'Expensive & weak' }
    },
    spend:     {
      label: 'Spend percentile',
      getValue: d => d.spend || 0,
      quadrants: { tr: 'High-spend & strong-ranked', tl: 'Spending big, weak rank', br: 'Strong rank, underspent', bl: 'Low spend, low signal' }
    },
  };

  function setCompareYMetric(metric) {
    if (!COMPARE_Y_METRICS[metric]) return;
    _compareYMetric = metric;
    const lab = document.getElementById('compareYAxisLabel');
    if (lab) lab.textContent = COMPARE_Y_METRICS[metric].label;
    // Re-render markers in place from the existing dataset cached on the section node
    const section = document.getElementById('compareSection');
    if (section && section._compareAds) initComparePlot(section._compareAds);
  }

  // Convert raw values to percentile rank (0-100) within the visible peer set
  function _percentileRank(values, value) {
    if (values.length <= 1) return 50;
    let below = 0, equal = 0;
    for (const v of values) {
      if (v < value) below++;
      else if (v === value) equal++;
    }
    // Inclusive percentile: (below + 0.5*equal) / N * 100
    return ((below + 0.5 * equal) / values.length) * 100;
  }

  function _scoreState(score) {
    if (score == null) return 'low';
    if (score >= 70) return 'good';
    if (score >= 40) return 'mid';
    return 'low';
  }

  function buildCompareSection(ads) {
    const n = ads.length;

    // Count live vs completed/paused for the section header summary
    const _liveN = ads.filter(a => (a.ad_status || '').toUpperCase() === 'ACTIVE').length;
    const _completedN = ads.filter(a => ['COMPLETED','PAUSED'].includes((a.ad_status || '').toUpperCase())).length;

    let h = `<div class="section compare-section" id="compareSection">`;
    h += `<div class="section-header">
      <div class="section-title">
        <div class="section-icon icon-compare">▦</div>
        <h2>Compare Creatives</h2>
        <span class="section-count">${n} ad${n!==1?'s':''} • ${_liveN} live • ${_completedN} completed • score vs <span id="compareYAxisLabel">${COMPARE_Y_METRICS[_compareYMetric].label}</span></span>
      </div>
      <div class="compare-controls">
        <span class="compare-y-label">Y-axis</span>
        <select class="compare-y-select" onchange="setCompareYMetric(this.value)">
          <option value="quality"${_compareYMetric==='quality'?' selected':''}>Overall quality (all-round)</option>
          <option value="reach"${_compareYMetric==='reach'?' selected':''}>Reach percentile</option>
          <option value="view_rate"${_compareYMetric==='view_rate'?' selected':''}>Video view rate percentile</option>
          <option value="cpm"${_compareYMetric==='cpm'?' selected':''}>CPM percentile (lower = higher)</option>
          <option value="spend"${_compareYMetric==='spend'?' selected':''}>Spend percentile</option>
        </select>
      </div>
    </div>`;

    h += `<div class="compare-card">`;

    if (n === 0) {
      h += `<div class="compare-plot-area"><div class="compare-empty">
        <div style="font-weight:600;color:var(--text-2);">No scored ads to compare</div>
        <div>Awareness/Reach + Engagement/Community ads with thumbnails will appear here once scored.</div>
      </div></div>`;
      h += `</div></div>`;
      return h;
    }

    // Plot area structure — markers will be injected by initComparePlot
    h += `<div class="compare-plot-wrap">
      <div class="compare-plot-area" id="comparePlotArea">
        <svg class="compare-svg-bg" preserveAspectRatio="none">
          <g class="compare-grid" id="compareGridLines"></g>
        </svg>
        <span class="compare-quadrant-label top-right">Best scale candidates</span>
        <span class="compare-quadrant-label top-left">High reach, weaker score</span>
        <span class="compare-quadrant-label bottom-right">Good score, room to scale</span>
        <span class="compare-quadrant-label bottom-left">Low priority</span>
        <span class="compare-axis-label compare-axis-x">Score (0–100)</span>
        <span class="compare-axis-label compare-axis-y" id="compareYLabelEl">${COMPARE_Y_METRICS[_compareYMetric].label}</span>
        <div class="compare-plot-inner" id="comparePlotInner"></div>
      </div>
      <div class="compare-tooltip" id="compareTooltip"></div>
    </div>`;

    // Legend — two distinct signals: border ring (absolute quality) vs score pill (peer-relative boost decision)
    h += `<div class="compare-legend">
      <span class="compare-legend-group" style="color:var(--text-2); font-weight:600;">Border ring · absolute quality (vs 90d history):</span>
      <span class="compare-legend-group"><span class="compare-legend-swatch" style="background:transparent; border:2px solid var(--green); border-radius:4px;"></span>Strong (≥75th pct)</span>
      <span class="compare-legend-group"><span class="compare-legend-swatch" style="background:transparent; border:2px solid var(--orange); border-radius:4px;"></span>OK (40–74th)</span>
      <span class="compare-legend-group"><span class="compare-legend-swatch" style="background:transparent; border:2px solid rgba(248,113,113,0.55); border-radius:4px;"></span>Weak (&lt;40th)</span>
      <span class="compare-legend-divider"></span>
      <span class="compare-legend-group" style="color:var(--text-2); font-weight:600;">Score pill · peer-relative (boost decision):</span>
      <span class="compare-legend-group"><span class="compare-legend-swatch" style="background:rgba(52,211,153,0.85);"></span>≥70 boost</span>
      <span class="compare-legend-group"><span class="compare-legend-swatch" style="background:rgba(245,158,11,0.85);"></span>40–69</span>
      <span class="compare-legend-group"><span class="compare-legend-swatch" style="background:rgba(239,68,68,0.80);"></span>&lt;40</span>
      <span class="compare-legend-divider"></span>
      <span class="compare-legend-group" style="color:var(--text-2); font-weight:600;">Status:</span>
      <span class="compare-legend-group"><span class="compare-legend-swatch" style="background:transparent; border:2px solid var(--text-2); border-radius:4px; opacity:1;"></span>Live (full colour)</span>
      <span class="compare-legend-group"><span class="compare-legend-swatch" style="background:transparent; border:2px solid var(--text-2); border-radius:4px; opacity:0.55; filter:saturate(0.65);"></span>Completed / Paused (dimmed, hover for full colour)</span>
      <span class="compare-legend-divider"></span>
      <span class="compare-legend-group"><span class="compare-legend-platform" style="background:linear-gradient(135deg, #FCAF45, #E1306C 50%, #5851DB);"></span>Instagram</span>
      <span class="compare-legend-group"><span class="compare-legend-platform" style="background:#000;"></span>TikTok</span>
      <span class="compare-legend-group" style="margin-left:auto; color:var(--text-3);">Click any creative to open its history</span>
    </div>`;

    h += `</div></div>`; // close compare-card, compare-section
    return h;
  }

  // Tiny inline SVG logo for the platform badge (10×10 inside a 16×16 badge).
  // Coloured by CSS — fill / stroke set per .plat-* class.
  function _platformLogoSVG(platform) {
    const p = (platform || '').toLowerCase();
    if (p === 'instagram') {
      // Camera-square + lens — stroked (white on the IG gradient background)
      return `<svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.6" fill="#fff" stroke="none"/></svg>`;
    }
    if (p === 'tiktok') {
      // TikTok music note — filled white on black
      return `<svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5.8 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1.84-.1z"/></svg>`;
    }
    if (p === 'facebook') {
      // Facebook 'f' mark
      return `<svg viewBox="0 0 24 24"><path d="M13.5 21v-7.5h2.5l.4-3.1h-2.9V8.5c0-.9.25-1.5 1.55-1.5H17V4.2c-.3-.05-1.3-.13-2.45-.13-2.4 0-4.05 1.47-4.05 4.16v2.17H8v3.1h2.5V21z"/></svg>`;
    }
    // Unknown — small dot
    return `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/></svg>`;
  }

  // Render gridlines + position markers inside the plot area
  function initComparePlot(ads) {
    const section = document.getElementById('compareSection');
    if (!section) return;
    section._compareAds = ads;

    const plot = document.getElementById('comparePlotArea');
    const inner = document.getElementById('comparePlotInner');
    const tooltip = document.getElementById('compareTooltip');
    if (!plot || !inner || !ads || ads.length === 0) return;

    // Gridlines (rendered in SVG, scaled via viewBox)
    const grid = document.getElementById('compareGridLines');
    if (grid) {
      // Plot inner box position relative to the plot area
      const innerBox = inner.getBoundingClientRect();
      const plotBox = plot.getBoundingClientRect();
      const left = innerBox.left - plotBox.left;
      const top = innerBox.top - plotBox.top;
      const w = innerBox.width;
      const h = innerBox.height;

      const svg = plot.querySelector('.compare-svg-bg');
      if (svg) {
        svg.setAttribute('width', plotBox.width);
        svg.setAttribute('height', plotBox.height);
        svg.setAttribute('viewBox', `0 0 ${plotBox.width} ${plotBox.height}`);
      }

      let gridHTML = '';
      // Vertical gridlines every 25 (major), every 12.5 minor
      [0,25,50,75,100].forEach(p => {
        const x = left + (p/100)*w;
        const cls = (p === 50) ? 'major' : '';
        gridHTML += `<line class="${cls}" x1="${x}" y1="${top}" x2="${x}" y2="${top+h}"/>`;
      });
      [0,25,50,75,100].forEach(p => {
        const y = top + h - (p/100)*h;
        const cls = (p === 50) ? 'major' : '';
        gridHTML += `<line class="${cls}" x1="${left}" y1="${y}" x2="${left+w}" y2="${y}"/>`;
      });
      // Axis lines
      gridHTML += `<line class="compare-axis-line" x1="${left}" y1="${top+h}" x2="${left+w}" y2="${top+h}"/>`;
      gridHTML += `<line class="compare-axis-line" x1="${left}" y1="${top}" x2="${left}" y2="${top+h}"/>`;
      grid.innerHTML = gridHTML;

      // Tick labels
      // Remove existing tick labels first
      plot.querySelectorAll('.compare-tick-label').forEach(t => t.remove());
      [0,25,50,75,100].forEach(p => {
        // X-axis ticks (below)
        const xt = document.createElement('span');
        xt.className = 'compare-tick-label';
        xt.style.left = (left + (p/100)*w) + 'px';
        xt.style.top = (top + h + 6) + 'px';
        xt.style.transform = 'translateX(-50%)';
        xt.textContent = p;
        plot.appendChild(xt);
        // Y-axis ticks (left)
        const yt = document.createElement('span');
        yt.className = 'compare-tick-label';
        yt.style.left = (left - 8) + 'px';
        yt.style.top = (top + h - (p/100)*h) + 'px';
        yt.style.transform = 'translate(-100%, -50%)';
        yt.textContent = p;
        plot.appendChild(yt);
      });
    }

    const yMeta = COMPARE_Y_METRICS[_compareYMetric] || COMPARE_Y_METRICS.reach;

    // Update quadrant labels to reflect the current Y-axis metric
    const qLabels = yMeta.quadrants || COMPARE_Y_METRICS.reach.quadrants;
    const qTR = plot.querySelector('.compare-quadrant-label.top-right');
    const qTL = plot.querySelector('.compare-quadrant-label.top-left');
    const qBR = plot.querySelector('.compare-quadrant-label.bottom-right');
    const qBL = plot.querySelector('.compare-quadrant-label.bottom-left');
    if (qTR) qTR.textContent = qLabels.tr;
    if (qTL) qTL.textContent = qLabels.tl;
    if (qBR) qBR.textContent = qLabels.br;
    if (qBL) qBL.textContent = qLabels.bl;

    // Build (or reuse) the 90-day historical distribution per bucket × metric.
    // Source: the dashboard's `allData` global, which holds all loaded snapshots.
    const sourceData = (typeof allData !== 'undefined' && Array.isArray(allData) && allData.length > 0) ? allData : ads;
    if (!_compareBucketHistory || _compareBucketHistoryStamp !== sourceData.length) {
      _compareBucketHistory = buildCompareBucketHistory(sourceData);
      _compareBucketHistoryStamp = sourceData.length;
    }
    const history = _compareBucketHistory;

    // First pass: compute absolute quality (90d historical) for every ad and stash it
    // on the data row so both the Y-axis and the tooltip can read it.
    ads.forEach(d => {
      const aq = computeAbsoluteQuality(d, history);
      d._aqQuality = aq.quality;
      d._aqBreakdown = aq.breakdown;
      d._aqState = aq.state;
    });

    // Compute Y-axis values AFTER AQ has been stashed (so the 'quality' getValue can read d._aqQuality)
    const yValues = ads.map(yMeta.getValue);

    // Clear existing markers
    inner.innerHTML = '';

    // Build positioned markers
    const placed = []; // [{x,y,el}] for overlap detection
    ads.forEach(d => {
      const score = d._score != null ? Math.max(0, Math.min(100, d._score)) : 50;
      // For "Overall quality" the value is already an absolute 0-100 score, so plot it directly.
      // For all other metrics, rank within the visible peer set so positions are comparable.
      const yPct = yMeta.usesAbsoluteQuality
        ? Math.max(0, Math.min(100, yMeta.getValue(d)))
        : _percentileRank(yValues, yMeta.getValue(d));
      const peerState = _scoreState(d._score);
      const aqState = d._aqState;  // 'strong' | 'ok' | 'weak' | 'unknown'
      const platClass = 'plat-' + ((d.publisher_platform || 'unknown').toLowerCase());
      const platLogoHTML = _platformLogoSVG(d.publisher_platform);

      // Position
      let xPx = (score / 100) * inner.clientWidth;
      let yPx = inner.clientHeight - (yPct / 100) * inner.clientHeight;

      // Overlap nudge: if too close to an existing marker, jitter slightly
      const MIN_DIST = 30;
      let attempts = 0;
      while (attempts < 8) {
        const conflict = placed.find(p => Math.hypot(p.x - xPx, p.y - yPx) < MIN_DIST);
        if (!conflict) break;
        // Spiral nudge
        const angle = (attempts + 1) * 0.9;
        xPx += Math.cos(angle) * 18;
        yPx += Math.sin(angle) * 18;
        attempts++;
      }
      // Clamp inside box
      xPx = Math.max(20, Math.min(inner.clientWidth - 20, xPx));
      yPx = Math.max(20, Math.min(inner.clientHeight - 20, yPx));

      // Resolve ad status → visual treatment.
      // LIVE is the default look (no badge). Completed / paused are dimmed + desaturated. New / Issues get a coloured badge.
      const adStatusRaw = (d.ad_status || '').toUpperCase();
      let dataStatus = 'live';
      let statusBadgeHTML = '';
      if (adStatusRaw === 'COMPLETED') {
        dataStatus = 'completed';
        statusBadgeHTML = `<span class="compare-marker-status status-completed">Done</span>`;
      } else if (adStatusRaw === 'PAUSED') {
        dataStatus = 'paused';
        statusBadgeHTML = `<span class="compare-marker-status status-paused">Paused</span>`;
      } else if (adStatusRaw === 'NEW') {
        dataStatus = 'new';
        statusBadgeHTML = `<span class="compare-marker-status status-new">New</span>`;
      } else if (adStatusRaw === 'ISSUES') {
        dataStatus = 'issues';
        statusBadgeHTML = `<span class="compare-marker-status status-issues">Issue</span>`;
      }
      d._adStatusLabel = adStatusRaw === 'ACTIVE' ? 'Live' : (adStatusRaw ? adStatusRaw.charAt(0) + adStatusRaw.slice(1).toLowerCase() : '—');

      const marker = document.createElement('div');
      // Border ring = absolute quality (90-day historical) ; pill = peer-relative score
      marker.className = `compare-marker aq-${aqState}`;
      marker.dataset.status = dataStatus;
      marker.style.left = xPx + 'px';
      marker.style.top = yPx + 'px';
      const placeholderHTML = `<div class="compare-marker-placeholder" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>`;
      const thumb = (d.thumbnail_url || '').trim();
      // Render placeholder first; if we have a thumbnail URL, also render an <img> on top.
      // This guarantees the marker is never visually empty — if the image fails or doesn't load, the placeholder is still there underneath.
      const visualHTML = thumb
        ? `<div class="compare-marker-visual">${placeholderHTML}<img class="compare-marker-thumb" src="${thumb}" alt="" decoding="async" referrerpolicy="no-referrer"></div>`
        : `<div class="compare-marker-visual">${placeholderHTML}</div>`;
      marker.innerHTML = `
        ${visualHTML}
        ${statusBadgeHTML}
        <span class="compare-marker-platform ${platClass}" title="${d.publisher_platform || 'unknown'}">${platLogoHTML}</span>
        <span class="compare-marker-score score-${peerState}">${d._score != null ? d._score : '—'}</span>
      `;
      // Wire image fallback via JS to avoid attribute-quote escaping issues.
      const imgEl = marker.querySelector('img.compare-marker-thumb');
      if (imgEl) {
        imgEl.addEventListener('error', () => { imgEl.style.display = 'none'; }, { once: true });
        // If the image is already broken (e.g. cached 404), error may have fired before listener attached.
        if (imgEl.complete && imgEl.naturalWidth === 0) imgEl.style.display = 'none';
      }

      // Hover -> tooltip
      marker.addEventListener('mouseenter', e => _showCompareTooltip(d, marker, plot, tooltip));
      marker.addEventListener('mouseleave', e => _hideCompareTooltip(tooltip));
      // Click -> open existing detail flow
      marker.addEventListener('click', e => {
        e.stopPropagation();
        if (typeof openHistory === 'function') {
          openHistory(d.ad_id, d.publisher_platform, d.ad_name);
        }
      });

      inner.appendChild(marker);
      placed.push({ x: xPx, y: yPx, el: marker });
    });
  }

  function _showCompareTooltip(d, marker, plot, tooltip) {
    if (!tooltip) return;
    const platform = (d.publisher_platform || 'unknown');
    const isTikTok = platform.toLowerCase() === 'tiktok';
    const viewRateLabel = isTikTok ? '2s view rate' : '3s view rate';
    const viewRate = isTikTok ? (d.video_2s_view_rate || 0) : (d.video_3s_view_rate || 0);
    const benchmark = d._benchmark != null ? d._benchmark : null;
    const isBoost = d._boost === 'boost';

    const safeName = (d.ad_name || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const safeThumb = d.thumbnail_url || '';
    const scoreColorVal = d._score != null
      ? (d._score >= 70 ? 'var(--green)' : d._score >= 40 ? 'var(--orange)' : 'var(--red)')
      : 'var(--text-3)';

    // Absolute quality color
    const aqColor = d._aqState === 'strong' ? 'var(--green)'
                  : d._aqState === 'ok'     ? 'var(--orange)'
                  : d._aqState === 'weak'   ? 'var(--red)'
                  : 'var(--text-3)';
    const aqLabelMap = { strong: 'Strong', ok: 'OK', weak: 'Weak', unknown: 'Insufficient history' };
    const aqLabel = aqLabelMap[d._aqState] || '—';

    let breakdownHTML = '';
    if (d._aqBreakdown && d._aqBreakdown.length > 0) {
      breakdownHTML = `<div class="compare-tooltip-divider"></div>
        <div class="compare-tooltip-row" style="font-size:9.5px;text-transform:uppercase;letter-spacing:0.4px;color:var(--text-3);font-weight:600;padding-top:1px;"><span class="lbl">Per-metric pct (90d)</span><span class="val"></span></div>` +
        d._aqBreakdown.map(b => {
          const c = b.pct >= 75 ? 'var(--green)' : b.pct >= 40 ? 'var(--orange)' : 'var(--red)';
          return `<div class="compare-tooltip-row"><span class="lbl">${b.label}${b.invert ? ' (lower=better)' : ''}</span><span class="val" style="color:${c}">${b.pct}<span style="color:var(--text-3);font-weight:400;font-size:10px;">th</span></span></div>`;
        }).join('');
    }

    tooltip.innerHTML = `
      ${safeThumb ? `<img class="compare-tooltip-img" src="${safeThumb}" alt="" onerror="this.style.display='none'">` : ''}
      <div class="compare-tooltip-title">${safeName || 'Untitled ad'}</div>
      <div class="compare-tooltip-meta">${platform} · ${d.campaign_type || '—'}${d._adStatusLabel ? ' · <span style="color:'+(d._adStatusLabel==='Live'?'var(--green)':d._adStatusLabel==='Completed'?'var(--text-3)':d._adStatusLabel==='Paused'?'var(--orange)':'var(--text-2)')+'; font-weight:600;">'+d._adStatusLabel+'</span>' : ''}${isBoost ? ' · <span style="color:var(--green); font-weight:700;">BOOST</span>' : ''}</div>
      <div class="compare-tooltip-row"><span class="lbl">Peer score</span><span class="val" style="color:${scoreColorVal}">${d._score != null ? d._score : '—'}${benchmark != null ? ' / bench ' + benchmark : ''}</span></div>
      <div class="compare-tooltip-row"><span class="lbl">Absolute quality</span><span class="val" style="color:${aqColor}">${d._aqQuality != null ? d._aqQuality + ' · ' + aqLabel : aqLabel}</span></div>
      <div class="compare-tooltip-divider"></div>
      <div class="compare-tooltip-row"><span class="lbl">Reach</span><span class="val">${(d.reach||0).toLocaleString()}</span></div>
      <div class="compare-tooltip-row"><span class="lbl">CPM</span><span class="val">€${(d.cpm||0).toFixed(3)}</span></div>
      <div class="compare-tooltip-row"><span class="lbl">${viewRateLabel}</span><span class="val">${viewRate.toFixed(1)}%</span></div>
      <div class="compare-tooltip-row"><span class="lbl">Spend</span><span class="val">€${(d.spend||0).toFixed(2)}</span></div>
      ${breakdownHTML}
    `;

    // Position tooltip relative to plot, near marker
    const plotBox = plot.getBoundingClientRect();
    const markerBox = marker.getBoundingClientRect();
    let left = (markerBox.left - plotBox.left) + markerBox.width + 12;
    let top = (markerBox.top - plotBox.top) - 10;

    // Show first to measure
    tooltip.classList.add('active');
    const tWidth = tooltip.offsetWidth || 240;
    const tHeight = tooltip.offsetHeight || 240;

    // Keep inside plot bounds
    if (left + tWidth > plotBox.width - 8) {
      left = (markerBox.left - plotBox.left) - tWidth - 12;
    }
    if (top + tHeight > plotBox.height - 8) {
      top = plotBox.height - tHeight - 8;
    }
    if (top < 8) top = 8;

    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
  }

  function _hideCompareTooltip(tooltip) {
    if (tooltip) tooltip.classList.remove('active');
  }

  // Re-position on window resize
  window.addEventListener('resize', () => {
    const section = document.getElementById('compareSection');
    if (section && section._compareAds) initComparePlot(section._compareAds);
  });

  function buildSection({type, title, sub, iconClass, icon, formula, chipClass, ads, scoreKey, metrics, summaryExtras}) {
    let h = `<div class="section">`;

    // Count live vs completed vs new ads
    const liveCount = ads.filter(d => d.ad_status === 'ACTIVE').length;
    const budgetSpentCount = ads.filter(d => d.ad_status === 'COMPLETED').length;
    const pausedCount = ads.filter(d => d.ad_status === 'PAUSED').length;
    const newCount = ads.filter(d => d.ad_status === 'NEW').length;

    let countParts = [];
    if (liveCount > 0) countParts.push(liveCount + ' live');
    if (newCount > 0) countParts.push(newCount + ' new');
    if (pausedCount > 0) countParts.push(pausedCount + ' paused');
    if (budgetSpentCount > 0) countParts.push(budgetSpentCount + ' completed');

    h += `<div class="section-header">
      <div class="section-title">
        <div class="section-icon ${iconClass}">${icon}</div>
        <h2>${title}</h2>
        <span class="section-count">${ads.length} ad${ads.length!==1?'s':''}${countParts.length ? ' \u2022 ' + countParts.join(' \u2022 ') : ''}</span>
      </div>
      <span style="font-size:12px; color:var(--text-3)">${sub}</span>
    </div>`;

    // Formula
    h += `<div class="formula"><strong>Score =</strong> `;
    formula.forEach(([label, weight], i) => {
      if (i > 0) h += ` <span style="color:var(--text-3)">+</span> `;
      h += `<span class="chip ${chipClass}">${label} ${weight}</span>`;
    });
    h += `<span style="margin-left:auto; font-size:10px; color:var(--text-3)">0–100 peer-relative · top 30% = BOOST</span>`;
    h += `<span class="score-info-btn" onclick="event.stopPropagation(); showScoreInfo('${type}')" title="How is this score calculated?">?</span>`;
    h += `</div>`;

    if (ads.length === 0) {
      h += `<div class="empty"><h3>No ${type} ads found</h3><p>No data for current filters.</p></div></div>`;
      return h;
    }

    // Summary — peer-relative scoring stats
    const scoredAds = ads.filter(d => d._score != null);
    const avgScore = scoredAds.length > 0 ? Math.round(scoredAds.reduce((s, d) => s + d._score, 0) / scoredAds.length) : null;
    const boostCount = ads.filter(d => d._boost === 'boost').length;
    const noBoostCount = scoredAds.length - boostCount;
    const unscoredCount = ads.length - scoredAds.length;

    h += `<div class="summary" style="grid-template-columns: repeat(4, 1fr);">`;
    h += `<div class="summary-card"><div class="summary-label">Avg Score</div><div class="summary-value" style="color:${avgScore != null ? scoreColor(avgScore) : 'var(--text-3)'}">${avgScore != null ? avgScore : '—'}</div></div>`;
    h += `<div class="summary-card"><div class="summary-label">Boost</div><div class="summary-value" style="color:var(--green)">${boostCount}</div></div>`;
    h += `<div class="summary-card"><div class="summary-label">No Boost</div><div class="summary-value" style="color:var(--text-3)">${noBoostCount}</div></div>`;
    h += `<div class="summary-card"><div class="summary-label">Unscored</div><div class="summary-value" style="color:var(--text-dim)">${unscoredCount}</div></div>`;
    h += `</div>`;

    // Ad cards
    const scoredValues = ads.filter(d => d._score != null).map(d => d._score);
    const topScore = scoredValues.length > 0 ? Math.max(...scoredValues) : null;

    h += `<div class="ad-grid">`;
    ads.forEach((d, i) => {
      const score = d._score;
      const isWinner = score != null && score === topScore && ads.length > 1 && score > 0;
      const m = metrics(d);
      const platClass = 'plat-' + (d.publisher_platform || 'unknown');
      const platLabel = cap(d.publisher_platform || 'unknown');
      const hasThumb = d.thumbnail_url && d.thumbnail_url.startsWith('http');

      // Determine ad status — uses Meta's effective_status directly
      const adStatus = d.ad_status || 'UNKNOWN';
      const isLive = adStatus === 'ACTIVE';
      const isPaused = adStatus === 'PAUSED';
      const isCompleted = adStatus === 'COMPLETED';
      const isPending = adStatus === 'PENDING';
      const isNew = adStatus === 'NEW';
      const statusClass = isCompleted ? 'status-budget-spent' : isNew ? 'status-new' : isLive ? 'status-live' : isPaused ? 'status-paused' : isPending ? 'status-new' : 'status-ended';
      const statusLabel = isCompleted ? 'Completed' : isNew ? 'New' : isLive ? 'Live' : isPaused ? 'Paused' : isPending ? 'Pending' : adStatus === 'ISSUES' ? 'Issues' : 'Ended';

      const cardExtraClass = (isCompleted || isPaused || adStatus === 'ISSUES') ? 'budget-spent' : isNew ? 'ad-new' : isLive ? 'ad-live' : '';
      h += `<div class="ad-card ${cardExtraClass}" style="cursor:pointer;" onclick="openHistory('${esc(d.ad_id)}', '${esc(d.publisher_platform)}', '${esc(d.ad_name)}')">`;

      // Visual
      h += `<div class="ad-visual">`;
      if (hasThumb) {
        h += `<img src="${esc(d.thumbnail_url)}" alt="Ad" loading="lazy">`;
      } else {
        h += `<div class="ad-visual-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>Ad creative</span></div>`;
      }
      h += `<span class="badge-platform ${platClass}">${platLabel}</span>`;
      h += `<span class="badge-status ${statusClass}">${statusLabel}</span>`;
      // Score badge (color-coded 0-100, solid background with white text)
      if (d._score != null) {
        h += `<span class="badge-score" style="background:${scoreBgColor(d._score)}; color:#fff;">${d._score}</span>`;
      } else {
        h += `<span class="badge-score" style="background:rgba(255,255,255,0.08); color:var(--text-3);">—</span>`;
      }
      h += `</div>`;

      // Body
      h += `<div class="ad-body">`;
      h += `<div class="ad-name" title="${esc(d.ad_name)}">${esc(d.ad_name)}</div>`;
      // Show ad age if created_time is available
      if (d.ad_created_time) {
        const ageMs = Date.now() - new Date(d.ad_created_time).getTime();
        const ageH = Math.floor(ageMs / 3600000);
        const ageLabel = ageH < 24 ? ageH + 'h old' : Math.floor(ageH / 24) + 'd old';
        h += `<div style="font-size:10px;color:var(--text-dim);margin-top:2px;">Launched ${new Date(d.ad_created_time).toLocaleDateString()} · ${ageLabel}</div>`;
      }

      h += `<div class="ad-metrics">`;
      m.forEach(([label, value]) => {
        h += `<div class="ad-metric"><div class="ad-metric-label">${label}</div><div class="ad-metric-value">${value}</div></div>`;
      });
      h += `</div>`;

      // Footer — score + benchmark + boost tag
      h += `<div class="ad-footer" style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">`;
      if (d._score != null) {
        h += `<span style="font-size:12px; font-weight:600; color:${scoreColor(d._score)};">Score: ${d._score}</span>`;
        if (d._benchmark != null) {
          h += `<span style="font-size:11px; color:var(--text-3);">Benchmark: ${d._benchmark}</span>`;
        }
        if (d._boost === 'boost') {
          h += `<span style="padding:2px 8px; border-radius:4px; font-size:10px; font-weight:700; background:rgba(52,211,153,0.15); color:var(--green); border:1px solid rgba(52,211,153,0.3); letter-spacing:0.5px;">BOOST</span>`;
        }
      } else {
        h += `<span style="font-size:11px; color:var(--text-dim);">Score: awaiting peers</span>`;
      }
      h += `</div>`;

      h += `</div></div>`; // close ad-body, ad-card
    });
    h += `</div>`;

    h += `</div>`; // close section
    return h;
  }

  // ====== COMPARE VIEW ======
  function renderCompare(ads) {
    const c = document.getElementById('dashboardContent');

    // Group by ad_name
    const groups = new Map();
    for (const d of ads) {
      if (!groups.has(d.ad_name)) groups.set(d.ad_name, []);
      groups.get(d.ad_name).push(d);
    }

    // Only show ads that appear on 2+ platforms
    const multiPlatform = [...groups.entries()].filter(([, items]) => {
      const platforms = new Set(items.map(d => d.publisher_platform));
      return platforms.size >= 2;
    });

    if (multiPlatform.length === 0) {
      c.innerHTML = `<div class="section">
        <div class="section-header">
          <div class="section-title">
            <div class="section-icon icon-awareness">\u2194</div>
            <h2>Platform Comparison</h2>
          </div>
        </div>
        <div class="empty"><h3>No cross-platform data</h3><p>Comparison requires the same ad running on 2+ platforms.</p></div>
      </div>`;
      return;
    }

    let h = `<div class="section">
      <div class="section-header">
        <div class="section-title">
          <div class="section-icon icon-awareness">\u2194</div>
          <h2>Platform Comparison</h2>
          <span class="section-count">${multiPlatform.length} ad${multiPlatform.length!==1?'s':''}</span>
        </div>
        <span style="font-size:12px; color:var(--text-3)">Same ad across platforms</span>
      </div>`;

    for (const [adName, items] of multiPlatform) {
      const isAwareness = items[0].campaign_type === 'awareness' || items[0].campaign_type === 'reach';
      const isTraffic = items[0].campaign_type === 'traffic';
      const thumb = items.find(d => d.thumbnail_url)?.thumbnail_url;

      h += `<div class="compare-group">`;

      // Header with thumbnail and ad name
      h += `<div class="compare-header">`;
      if (thumb) {
        h += `<img class="compare-thumb" src="${esc(thumb)}" alt="">`;
      } else {
        h += `<div class="compare-thumb-placeholder">\u25A3</div>`;
      }
      h += `<div class="compare-ad-info">
        <div class="compare-ad-name" title="${esc(adName)}">${esc(adName)}</div>
        <div class="compare-ad-type">${isAwareness ? 'Awareness' : isTraffic ? 'Traffic' : 'Engagement'} campaign</div>
      </div></div>`;

      // Table
      h += `<table class="compare-table">`;

      if (isAwareness) {
        h += `<tr><th>Platform</th><th>Reach</th><th>CPM</th><th>Video View Rate</th><th>Impressions</th><th>Score</th></tr>`;
        const bestReach = Math.max(...items.map(d => d.reach || 0));
        const bestCpm = Math.min(...items.filter(d => d.cpm > 0).map(d => d.cpm));
        const bestVr = Math.max(...items.map(d => getViewRate(d)));

        for (const d of items.sort((a,b) => (b.reach||0) - (a.reach||0))) {
          const platDot = 'dot-' + (d.publisher_platform || 'unknown');
          h += `<tr>`;
          h += `<td><div class="compare-plat-cell"><span class="compare-plat-dot ${platDot}"></span>${cap(d.publisher_platform || 'unknown')}</div></td>`;
          h += `<td>${fmt(d.reach)}${d.reach === bestReach && items.length > 1 ? '<span class="compare-best">Best</span>' : ''}</td>`;
          h += `<td>\u20ac${(d.cpm||0).toFixed(3)}${d.cpm === bestCpm && items.length > 1 ? '<span class="compare-best">Best</span>' : ''}</td>`;
          h += `<td>${getViewRate(d).toFixed(1)}%${getViewRate(d) === bestVr && items.length > 1 ? '<span class="compare-best">Best</span>' : ''}</td>`;
          h += `<td>${fmt(d.impressions)}</td>`;
          h += `<td style="color:${d._score != null ? scoreColor(d._score) : 'var(--text-3)'}">${d._score ?? '—'}</td>`;
          h += `</tr>`;
        }
      } else if (isTraffic) {
        h += `<tr><th>Platform</th><th>Link Clicks</th><th>CTR</th><th>CPM</th><th>Reach</th><th>Score</th></tr>`;
        const bestClicks = Math.max(...items.map(d => d.link_clicks || 0));
        const bestCtr = Math.max(...items.map(d => d.ctr || 0));
        const bestCpm = Math.min(...items.filter(d => d.cpm > 0).map(d => d.cpm));

        for (const d of items.sort((a,b) => (b.link_clicks||0) - (a.link_clicks||0))) {
          const platDot = 'dot-' + (d.publisher_platform || 'unknown');
          h += `<tr>`;
          h += `<td><div class="compare-plat-cell"><span class="compare-plat-dot ${platDot}"></span>${cap(d.publisher_platform || 'unknown')}</div></td>`;
          h += `<td>${fmt(d.link_clicks)}${d.link_clicks === bestClicks && items.length > 1 ? '<span class="compare-best">Best</span>' : ''}</td>`;
          h += `<td>${(d.ctr||0).toFixed(2)}%${d.ctr === bestCtr && items.length > 1 ? '<span class="compare-best">Best</span>' : ''}</td>`;
          h += `<td>\u20ac${(d.cpm||0).toFixed(3)}${d.cpm === bestCpm && items.length > 1 ? '<span class="compare-best">Best</span>' : ''}</td>`;
          h += `<td>${fmt(d.reach)}</td>`;
          h += `<td style="color:${d._score != null ? scoreColor(d._score) : 'var(--text-3)'}">${d._score ?? '—'}</td>`;
          h += `</tr>`;
        }
      } else {
        h += `<tr><th>Platform</th><th>Shares</th><th>Saves</th><th>Comments</th><th>Likes</th><th>Score</th></tr>`;
        const bestShares = Math.max(...items.map(d => d.shares || 0));
        const bestSaves = Math.max(...items.map(d => d.saves || 0));

        for (const d of items.sort((a,b) => ((b.shares||0)+(b.saves||0)) - ((a.shares||0)+(a.saves||0)))) {
          const platDot = 'dot-' + (d.publisher_platform || 'unknown');
          h += `<tr>`;
          h += `<td><div class="compare-plat-cell"><span class="compare-plat-dot ${platDot}"></span>${cap(d.publisher_platform || 'unknown')}</div></td>`;
          h += `<td>${fmt(d.shares)}${d.shares === bestShares && items.length > 1 ? '<span class="compare-best">Best</span>' : ''}</td>`;
          h += `<td>${fmt(d.saves)}${d.saves === bestSaves && items.length > 1 ? '<span class="compare-best">Best</span>' : ''}</td>`;
          h += `<td>${fmt(d.comments)}</td>`;
          h += `<td>${fmt(d.likes)}</td>`;
          h += `<td style="color:${d._score != null ? scoreColor(d._score) : 'var(--text-3)'}">${d._score ?? '—'}</td>`;
          h += `</tr>`;
        }
      }

      h += `</table>`;

      // Show AI insight from the best-performing platform
      const bestItem = items.reduce((a, b) => {
        const sa = a._score ?? 0;
        const sb = b._score ?? 0;
        return sb > sa ? b : a;
      });
      if (bestItem.ai_insight) {
        h += `<div class="compare-insight">\u2728 ${esc(bestItem.ai_insight)}</div>`;
      }

      h += `</div>`; // close compare-group
    }

    // Also show single-platform ads as a note
    const singlePlatform = [...groups.entries()].filter(([, items]) => {
      const platforms = new Set(items.map(d => d.publisher_platform));
      return platforms.size < 2;
    });
    if (singlePlatform.length > 0) {
      h += `<div class="compare-empty" style="margin-top:12px; padding:14px; background:var(--bg-1); border:1px solid var(--border); border-radius:var(--radius-xs);">
        <span style="color:var(--text-3)">${singlePlatform.length} ad${singlePlatform.length!==1?'s':''} running on a single platform only — not shown in comparison</span>
      </div>`;
    }

    h += `</div>`; // close section

    // ====== CAMPAIGN TYPE COMPARISON ======
    const awarenessAds = ads.filter(d => d.campaign_type === 'awareness' || d.campaign_type === 'reach');
    const engagementAds = ads.filter(d => d.campaign_type === 'engagement' || d.campaign_type === 'community');
    const trafficAds = ads.filter(d => d.campaign_type === 'traffic');

    // Build campaign type cards dynamically
    const typeCards = [];
    function typeCardStats(ads) {
      const scored = ads.filter(d => d._score != null);
      return {
        boostReady: ads.filter(d => d._boost === 'boost').length,
        avgScore: scored.length > 0 ? Math.round(scored.reduce((s,d) => s + d._score, 0) / scored.length) : 0
      };
    }

    if (awarenessAds.length > 0) {
      const a = awarenessAds;
      const st = typeCardStats(a);
      typeCards.push({
        label: 'Awareness', icon: '\u{1F4E3}', iconClass: 'icon-awareness', color: 'var(--blue)',
        count: a.length,
        boostReady: st.boostReady,
        avgScore: st.avgScore,
        totalImpressions: a.reduce((s,d) => s+(d.impressions||0),0),
        stats: [
          ['Total Reach', fmt(a.reduce((s,d)=>s+(d.reach||0),0)), true],
          ['Avg CPM', '\u20ac'+(a.reduce((s,d)=>s+(d.cpm||0),0)/a.length).toFixed(3), false],
          ['Avg View Rate', (a.reduce((s,d)=>s+getViewRate(d),0)/a.length).toFixed(1)+'%', false]
        ]
      });
    }
    if (engagementAds.length > 0) {
      const e = engagementAds;
      const st = typeCardStats(e);
      typeCards.push({
        label: 'Engagement', icon: '\u{1F4AC}', iconClass: 'icon-engagement', color: 'var(--purple)',
        count: e.length,
        boostReady: st.boostReady,
        avgScore: st.avgScore,
        totalImpressions: e.reduce((s,d) => s+(d.impressions||0),0),
        stats: [
          ['Shares+Saves', fmt(e.reduce((s,d)=>s+(d.shares||0)+(d.saves||0),0)), true],
          ['Comments', fmt(e.reduce((s,d)=>s+(d.comments||0),0)), false],
          ['Likes', fmt(e.reduce((s,d)=>s+(d.likes||0),0)), false]
        ]
      });
    }
    if (trafficAds.length > 0) {
      const t = trafficAds;
      const st = typeCardStats(t);
      typeCards.push({
        label: 'Traffic', icon: '\u{1F517}', iconClass: 'icon-traffic', color: 'var(--green)',
        count: t.length,
        boostReady: st.boostReady,
        avgScore: st.avgScore,
        totalImpressions: t.reduce((s,d) => s+(d.impressions||0),0),
        stats: [
          ['Total Clicks', fmt(t.reduce((s,d)=>s+(d.link_clicks||0),0)), true],
          ['Avg CTR', (t.reduce((s,d)=>s+(d.ctr||0),0)/t.length).toFixed(2)+'%', false],
          ['Avg CPM', '\u20ac'+(t.reduce((s,d)=>s+(d.cpm||0),0)/t.length).toFixed(3), false]
        ]
      });
    }

    if (typeCards.length >= 2) {
      const cols = typeCards.length === 3 ? '1fr 1fr 1fr' : '1fr 1fr';
      h += `<div class="section" style="margin-top:24px">
        <div class="section-header">
          <div class="section-title">
            <div class="section-icon" style="background:var(--purple-10); color:var(--purple)">\u26A1</div>
            <h2>Campaign Type Comparison</h2>
          </div>
          <span style="font-size:12px; color:var(--text-3)">Performance across campaign objectives</span>
        </div>
        <div class="compare-group">
          <div style="display:grid; grid-template-columns:${cols}; gap:16px;">`;

      for (const tc of typeCards) {
        h += `<div style="background:var(--bg-2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:18px;">
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:14px;">
            <div class="section-icon ${tc.iconClass}" style="width:28px; height:28px; font-size:13px;">${tc.icon}</div>
            <div>
              <div style="font-weight:600; color:var(--text-1);">${tc.label}</div>
              <div style="font-size:11px; color:var(--text-3)">${tc.count} ad${tc.count!==1?'s':''} \u2022 ${tc.boostReady} boost-ready</div>
            </div>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div class="compare-stat">
              <div style="font-size:11px; color:var(--text-3)">Avg Score</div>
              <div style="font-size:20px; font-weight:700; color:${sColor(tc.avgScore)}">${tc.avgScore}</div>
            </div>`;
        for (const [label, value, big] of tc.stats) {
          h += `<div class="compare-stat">
              <div style="font-size:11px; color:var(--text-3)">${label}</div>
              <div style="font-size:${big?'20':'16'}px; font-weight:${big?'700':'600'}; color:var(--text-1)">${value}</div>
            </div>`;
        }
        h += `</div></div>`;
      }

      h += `</div>
          <!-- Impressions comparison bar -->
          <div style="margin-top:14px; background:var(--bg-1); border:1px solid var(--border); border-radius:var(--radius-xs); padding:14px;">
            <div style="font-size:12px; font-weight:600; color:var(--text-2); margin-bottom:10px;">Total Impressions</div>
            <div style="display:flex; justify-content:center; align-items:center; gap:16px; flex-wrap:wrap;">`;
      for (const tc of typeCards) {
        h += `<div style="text-align:center;">
                <div style="font-size:18px; font-weight:700; color:${tc.color}">${fmt(tc.totalImpressions)}</div>
                <div style="font-size:11px; color:var(--text-3)">${tc.label}</div>
              </div>`;
      }

  // ====== SPARKLINE ======
  // Collects all snapshots for a given ad+platform across time, sorted chronologically
  // Uses historical Supabase data + current live data point for the trend line
  function getSparklineData(ad) {
    const historical = allData
      .filter(d => d.ad_name === ad.ad_name && d.publisher_platform === ad.publisher_platform)
      .sort((a, b) => new Date(a.captured_at) - new Date(b.captured_at));

    // If we're on live view, append the current live data point so sparkline shows up-to-now
    if (currentView === 'latest' && liveData.length > 0) {
      const livePoint = liveData.find(d => d.ad_name === ad.ad_name && d.publisher_platform === ad.publisher_platform);
      if (livePoint) {
        // Avoid duplicate if the last historical point is very recent
        const lastHistorical = historical[historical.length - 1];
        if (!lastHistorical || Math.abs(new Date(lastHistorical.captured_at) - new Date(livePoint.captured_at)) > 60000) {
          historical.push(livePoint);
        }
      }
    }
    return historical;
  }

  // Picks the metric to chart based on campaign type
  function sparklineMetric(d) {
    if (d.campaign_type === 'awareness' || d.campaign_type === 'reach') return d.reach || 0;
    if (d.campaign_type === 'traffic') return d.link_clicks || 0;
    return (d.shares || 0) + (d.saves || 0) + (d.comments || 0) + (d.likes || 0);
  }

  function sparklineLabel(d) {
    return 'Momentum Tracker';
  }

  // Builds an inline SVG sparkline from an array of numeric values
  function buildSparklineSVG(values, color) {
    const w = 260, h = 32, pad = 2;
    if (values.length < 2) return '';
    const min = Math.min(...values), max = Math.max(...values);
    const range = max - min || 1;
    const points = values.map((v, i) => {
      const x = pad + (i / (values.length - 1)) * (w - pad * 2);
      const y = pad + (1 - (v - min) / range) * (h - pad * 2);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    });
    // Gradient fill under the line
    const fillPoints = [
      `${pad},${h}`,
      ...points,
      `${(w - pad).toFixed(1)},${h}`
    ].join(' ');
    return `<svg class="sparkline-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <defs><linearGradient id="sg_${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
      </linearGradient></defs>
      <polygon points="${fillPoints}" fill="url(#sg_${color.replace('#','')})" />
      <polyline points="${points.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${points[points.length-1].split(',')[0]}" cy="${points[points.length-1].split(',')[1]}" r="2.5" fill="${color}"/>
    </svg>`;
  }

  // Builds the full sparkline card section
  function buildSparkline(ad) {
    const history = getSparklineData(ad);
    const values = history.map(d => sparklineMetric(d));
    const label = sparklineLabel(ad);
    const color = (ad.campaign_type === 'awareness' || ad.campaign_type === 'reach') ? '#53B7E8' : ad.campaign_type === 'traffic' ? '#34D399' : '#A855F7';

    let h = `<div class="sparkline-wrap">`;
    h += `<div class="sparkline-header">`;
    h += `<span class="sparkline-title">${label}</span>`;

    if (values.length >= 2) {
      const first = values[0], last = values[values.length - 1];
      const pctChange = first > 0 ? ((last - first) / first * 100) : 0;
      const arrow = pctChange > 0 ? '\u2191' : pctChange < 0 ? '\u2193' : '\u2192';
      const cls = pctChange > 0 ? 'up' : pctChange < 0 ? 'down' : 'flat';
      h += `<span class="sparkline-trend ${cls}">${arrow} ${Math.abs(pctChange).toFixed(0)}%</span>`;
    }

    h += `</div>`;

    if (values.length >= 2) {
      h += buildSparklineSVG(values, color);
    } else {
      h += `<div class="sparkline-empty">Trend available after 2+ captures</div>`;
    }

    h += `</div>`;
    return h;
  }

  // ====== TOGGLE COMPLETED ADS ======
  let hideCompleted = false; // Default: show BOTH live and completed; toggle hides completed when on
  function toggleCompleted(btn) {

  // ====== HELPERS ======
  function fmt(n) {
    if (n == null) return '0';
    if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
    if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
    return n.toLocaleString();
  }
  function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
  function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
  function clientHourLabel(hours) {
    const ord = ["First","Second","Third","Fourth","Fifth","Sixth","Seventh","Eighth","Ninth","Tenth","Eleventh","Twelfth"];
    if (hours == null || hours < 0) return "Launch";
    if (hours <= 12) return ord[Math.min(11, Math.floor(hours))] + " hour";
    return (Math.ceil(hours / 24) * 24) + " hours";
  }
  // Sequential label based on snapshot position (index), not stored snapshot_hours
  function sequentialHourLabel(index, totalSnaps) {
    const ord = ["First","Second","Third","Fourth","Fifth","Sixth","Seventh","Eighth","Ninth","Tenth","Eleventh","Twelfth"];
    if (index < 12) return ord[index] + " hour";
    return (Math.ceil((index + 1) / 24) * 24) + " hours";
  }
  function sColor(s) {
    if (s >= 100) return 'var(--green)';
    if (s >= 70) return 'var(--orange)';
    return 'var(--red)';
  }

  function renderHistory(data, adName, platform) {
    const overlay = document.getElementById('historyOverlay');
    const snaps = data.snapshots || [];
    const tracking = data.tracking;

    let h = `<div class="history-container">`;
    h += `<div class="history-header">`;
    h += `<div><div class="history-title">${esc(adName)}</div>`;
    h += `<div style="font-size:11px; color:var(--text-3); margin-top:2px;">${cap(platform)} &middot; ${snaps.length} snapshots captured</div></div>`;
    h += `<button class="history-close" onclick="closeHistory()">&times;</button>`;
    h += `</div>`;

    if (snaps.length === 0) {
      h += `<div class="history-empty">`;
      h += `<div class="history-empty-icon">&#128247;</div>`;
      h += `<div style="font-size:15px; font-weight:600; margin-bottom:8px;">No snapshots yet</div>`;

      }
      h += `</div>`;
      h += `</div>`;
      overlay.innerHTML = h;
      return;
    }

    // Compute deltas from first to last snapshot
    const first = snaps[0];
    const last = snaps[snaps.length - 1];
    const reachGrowth = last.reach - first.reach;
    const spendGrowth = last.spend - first.spend;
    const clicksGrowth = last.link_clicks - first.link_clicks;
    const timeSpanH = ((new Date(last.captured_at) - new Date(first.captured_at)) / 3600000).toFixed(1);

    // KPI cards
    h += `<div class="history-kpis">`;
    const kpis = [
      ['Current Reach', fmt(last.reach), reachGrowth > 0 ? '+'+fmt(reachGrowth) : '—', 'var(--blue)'],
      ['Current Spend', '\u20ac'+(last.spend||0).toFixed(2), spendGrowth > 0 ? '+\u20ac'+spendGrowth.toFixed(2) : '—', 'var(--text-1)'],
      ['Link Clicks', fmt(last.link_clicks), clicksGrowth > 0 ? '+'+fmt(clicksGrowth) : '—', 'var(--green)'],
      ['Time Tracked', timeSpanH + 'h', snaps.length + ' snapshots', 'var(--orange)']
    ];
    kpis.forEach(([label, value, delta, color]) => {
      h += `<div class="history-kpi">`;
      h += `<div class="history-kpi-label">${label}</div>`;
      h += `<div class="history-kpi-value" style="color:${color}">${value}</div>`;
      h += `<div class="history-kpi-delta" style="color:var(--text-3)">${delta}</div>`;
      h += `</div>`;
    });
    h += `</div>`;

    // Charts
    h += `<div class="history-charts-grid">`;
    h += `<div class="history-chart-box"><div class="history-chart-title">Reach Over Time <span style="font-size:10px;color:var(--text-3);font-weight:400;">(CET)</span></div><canvas id="histReach" height="180"></canvas></div>`;
    h += `<div class="history-chart-box"><div class="history-chart-title">Spend Over Time <span style="font-size:10px;color:var(--text-3);font-weight:400;">(CET)</span></div><canvas id="histSpend" height="180"></canvas></div>`;
    h += `<div class="history-chart-box"><div class="history-chart-title">CTR Over Time <span style="font-size:10px;color:var(--text-3);font-weight:400;">(CET)</span></div><canvas id="histCTR" height="180"></canvas></div>`;
    h += `<div class="history-chart-box"><div class="history-chart-title">CPM Over Time <span style="font-size:10px;color:var(--text-3);font-weight:400;">(CET)</span></div><canvas id="histCPM" height="180"></canvas></div>`;
    h += `</div>`;

    // Engagement chart (full width)
    h += `<div class="history-chart-box"><div class="history-chart-title">Engagement Over Time <span style="font-size:10px;color:var(--text-3);font-weight:400;">(CET)</span></div><canvas id="histEngagement" height="160"></canvas></div>`;

    // Snapshot table
    h += `<div class="history-chart-box">`;
    h += `<div class="history-chart-title">Snapshot Log</div>`;
    h += `<div style="max-height:280px; overflow-y:auto;">`;
    h += `<table class="history-snapshots-table">`;

    snaps.forEach((s, idx) => {
      // Use sequential position for hourly snapshots to avoid gaps from GH Actions timing

      h += `<td>\u20ac${(s.cpm||0).toFixed(3)}</td>`;
      h += `<td>${fmt(s.link_clicks)}</td>`;
      h += `<td>${score}</td>`;
      h += `</tr>`;
    });
    h += `</table></div></div>`;

    h += `</div>`; // close history-container
    overlay.innerHTML = h;

    // Render charts
    setTimeout(() => renderHistoryCharts(snaps), 50);
  }

    h += `<button class="report-close" onclick="closeReport()">&times;</button>`;

    // Header
    h += `<div style="display:flex; align-items:center; gap:12px; margin-bottom:6px;">`;
    h += `<img src="/assets/White fibreguard logo.png" alt="FibreGuard" style="height:22px; opacity:0.7;">`;
    h += `<div class="report-title">${esc(report.title || 'Performance Report')}</div>`;
    h += `</div>`;
    h += `<div class="report-date">${esc(report.dateRange || '')} &middot; Generated ${new Date().toLocaleDateString()} at ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>`;

    // Overview KPI cards
    h += `<div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; margin-bottom:24px;">`;
    const kpis = [
      ['Total Spend', '\u20ac' + (ov.totalSpend||0).toFixed(2), 'var(--text-1)'],
      ['Total Reach', fmt(ov.totalReach||0), 'var(--blue)'],
      ['Avg CTR', (ov.avgCTR||0).toFixed(2) + '%', 'var(--green)'],
      ['Active Ads', ov.activeAds || 0, 'var(--green)']
    ];
    kpis.forEach(([label, value, color]) => {
      h += `<div style="background:var(--bg-2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px; text-align:center;">`;
      h += `<div style="font-size:10px; color:var(--text-3); text-transform:uppercase; letter-spacing:0.3px;">${label}</div>`;
      h += `<div style="font-size:20px; font-weight:800; color:${color}; margin-top:4px;">${value}</div>`;
      h += `</div>`;
    });
    h += `</div>`;

    // Executive Summary
    h += `<div class="report-summary">${esc(report.executiveSummary || '')}</div>`;

    // Highlights & Concerns
    if ((report.highlights && report.highlights.length) || (report.concerns && report.concerns.length)) {
      h += `<div class="report-highlights">`;
      (report.highlights || []).forEach(hl => {
        h += `<div class="report-highlight">&#10003; ${esc(hl)}</div>`;
      });
      (report.concerns || []).forEach(c => {
        h += `<div class="report-concern">&#9888; ${esc(c)}</div>`;
      });
      h += `</div>`;
    }

    // Charts
    h += `<div class="report-charts-grid">`;
    h += `<div class="report-chart-container"><div class="report-chart-title">Spend by Campaign Type</div><canvas id="chartSpendByType" height="200"></canvas></div>`;
    h += `<div class="report-chart-container"><div class="report-chart-title">Top Ads by Score</div><canvas id="chartTopAds" height="200"></canvas></div>`;
    h += `</div>`;

    // Sections
    (report.sections || []).forEach(sec => {
      h += `<div class="report-section">`;
      h += `<div class="report-section-title">${esc(sec.title)}</div>`;
      h += `<div class="report-section-content">${esc(sec.content)}</div>`;
      if (sec.metrics && sec.metrics.length) {
        h += `<div class="report-metrics-row">`;
        sec.metrics.forEach(m => {
          const trendClass = m.trend === 'up' ? 'trend-up' : m.trend === 'down' ? 'trend-down' : 'trend-neutral';
          const trendIcon = m.trend === 'up' ? '&#9650;' : m.trend === 'down' ? '&#9660;' : '&#9654;';
          h += `<div class="report-metric-card">`;
          h += `<div class="report-metric-label">${esc(m.label)}</div>`;
          h += `<div class="report-metric-value">${esc(m.value)}</div>`;
          h += `<div class="report-metric-trend ${trendClass}">${trendIcon} ${esc(m.trend || 'neutral')}</div>`;
          h += `</div>`;
        });
        h += `</div>`;
      }
      h += `</div>`;
    });

    // Platform Comparison
    if (report.platformComparison) {
      const pc = report.platformComparison;
      h += `<div class="report-section">`;
      h += `<div class="report-section-title">&#127760; Platform Comparison</div>`;
      h += `<div class="report-section-content">${esc(pc.summary || '')}</div>`;
      h += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">`;
      if (pc.instagram) {
        h += `<div style="padding:14px; background:var(--bg-1); border-radius:var(--radius-xs); border:1px solid var(--border);">`;
        h += `<div style="font-weight:600; color:#E1306C; margin-bottom:6px;">Instagram</div>`;
        h += `<div style="font-size:12px; color:var(--text-2);">&#10003; ${esc(pc.instagram.strength || '')}</div>`;
        h += `<div style="font-size:12px; color:var(--text-3); margin-top:4px;">&#9888; ${esc(pc.instagram.weakness || '')}</div>`;
        h += `</div>`;
      }
      if (pc.facebook) {
        h += `<div style="padding:14px; background:var(--bg-1); border-radius:var(--radius-xs); border:1px solid var(--border);">`;
        h += `<div style="font-weight:600; color:#1877F2; margin-bottom:6px;">Facebook</div>`;
        h += `<div style="font-size:12px; color:var(--text-2);">&#10003; ${esc(pc.facebook.strength || '')}</div>`;
        h += `<div style="font-size:12px; color:var(--text-3); margin-top:4px;">&#9888; ${esc(pc.facebook.weakness || '')}</div>`;
        h += `</div>`;
      }
      h += `</div></div>`;
    }

    // Recommendations
    if (report.recommendations && report.recommendations.length) {
      h += `<div style="margin-bottom:24px;">`;
      h += `<div style="font-size:15px; font-weight:700; margin-bottom:12px;">&#128161; Recommendations</div>`;
      report.recommendations.forEach(rec => {
        const pClass = rec.priority === 'high' ? 'priority-high' : rec.priority === 'medium' ? 'priority-medium' : 'priority-low';
        h += `<div class="report-rec">`;
        h += `<span class="report-rec-priority ${pClass}">${esc(rec.priority)}</span>`;
        h += `<div><div class="report-rec-text">${esc(rec.action)}</div>`;
        if (rec.reason) h += `<div class="report-rec-reason">${esc(rec.reason)}</div>`;
        h += `</div></div>`;
      });
      h += `</div>`;
    }

    // Footer
    h += `<div style="text-align:center; padding-top:16px; border-top:1px solid var(--border); font-size:11px; color:var(--text-3);">`;
    h += `Generated by FibreGuard Ad Intelligence &middot; ${new Date().toLocaleDateString()}`;
    h += `</div>`;

    h += `</div>`; // close report-container
    overlay.innerHTML = h;

    // Render charts after DOM update
    setTimeout(() => renderReportCharts(cd), 50);
  }

  function renderReportCharts(cd) {
    // Spend by Type (Doughnut)
    const spendCtx = document.getElementById('chartSpendByType');
    if (spendCtx && cd.spendByType) {
      new Chart(spendCtx, {
        type: 'doughnut',
        data: {
          labels: cd.spendByType.map(d => d.label),
          datasets: [{
            data: cd.spendByType.map(d => d.value),
            backgroundColor: ['#53B7E8', '#A855F7', '#34D399'],
            borderColor: '#121722',
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'bottom', labels: { color: '#95A1BA', font: { size: 11 }, padding: 16 } }
          }
        }
      });
    }

    // Top Ads (Horizontal Bar)
    const topCtx = document.getElementById('chartTopAds');
    if (topCtx && cd.topAdsScores) {
      const typeColors = { awareness: '#53B7E8', engagement: '#A855F7', traffic: '#34D399' };
      new Chart(topCtx, {
        type: 'bar',
        data: {
          labels: cd.topAdsScores.map(d => d.name),
          datasets: [{
            data: cd.topAdsScores.map(d => d.score),
            backgroundColor: cd.topAdsScores.map(d => typeColors[d.type] || '#53B7E8'),
            borderRadius: 4,
            barThickness: 18
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: '#1B2235' }, ticks: { color: '#5B6A85', font: { size: 10 } } },
            y: { grid: { display: false }, ticks: { color: '#95A1BA', font: { size: 10 } } }
          }
        }
      });
    }
  }
</script>

<!-- History Modal Overlay -->
<div class="history-overlay" id="historyOverlay"></div>

<!-- Report Modal Overlay -->
<div class="report-overlay" id="reportOverlay"></div>

<!-- Score Info Overlay -->
<div class="score-info-overlay" id="scoreInfoOverlay" onclick="if(event.target===this)closeScoreInfo()"></div>

</body>
</html>
