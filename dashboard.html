<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FibreGuard Ad Performance Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-0: #070A10;
    --bg-1: #0C1017;
    --bg-2: #121722;
    --bg-3: #1A2030;
    --bg-hover: #1E2640;
    --border: #1B2235;
    --border-light: #283350;
    --text-1: #F1F3F6;
    --text-2: #95A1BA;
    --text-3: #5B6A85;
    --blue: #53B7E8;
    --blue-10: rgba(83,183,232,0.10);
    --blue-20: rgba(83,183,232,0.20);
    --blue-40: rgba(83,183,232,0.40);
    --purple: #A855F7;
    --purple-10: rgba(168,85,247,0.10);
    --green: #34D399;
    --green-10: rgba(52,211,153,0.10);
    --orange: #FBBF24;
    --orange-10: rgba(251,191,36,0.10);
    --red: #F87171;
    --red-10: rgba(248,113,113,0.10);
    --gold: #FFD700;
    --radius: 14px;
    --radius-sm: 10px;
    --radius-xs: 6px;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg-0);
    color: var(--text-1);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* TOPNAV */
  .topnav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px; border-bottom: 1px solid var(--border);
    background: rgba(12,16,23,0.85); backdrop-filter: blur(16px);
    position: sticky; top: 0; z-index: 100;
  }
  .topnav-left { display: flex; align-items: center; gap: 14px; }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo img {
    height: 26px; width: auto; object-fit: contain;
  }
  .logo-sep { width: 1px; height: 20px; background: var(--border); }
  .logo-sub { font-size: 13px; color: var(--text-3); }
  .topnav-right { display: flex; align-items: center; gap: 10px; }
  .meta-text { font-size: 11px; color: var(--text-3); }

  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 13px; border-radius: var(--radius-xs);
    font-size: 12px; font-weight: 500; font-family: inherit;
    cursor: pointer; border: 1px solid var(--border);
    background: var(--bg-2); color: var(--text-2); transition: all 0.15s;
  }
  .btn:hover { border-color: var(--border-light); color: var(--text-1); }
  .btn svg { width: 13px; height: 13px; }

  /* CONTAINER */
  .container { max-width: 1400px; margin: 0 auto; padding: 24px 28px; }

  /* FILTERS */
  .filters-bar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
    margin-bottom: 20px; padding: 12px 16px;
    background: var(--bg-1); border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }
  .filter-group { display: flex; align-items: center; gap: 5px; }
  .filter-label {
    font-size: 10px; font-weight: 600; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  select {
    background: var(--bg-2); border: 1px solid var(--border);
    color: var(--text-1); padding: 6px 26px 6px 10px;
    border-radius: var(--radius-xs); font-size: 12px; font-family: inherit;
    cursor: pointer; appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%235B6A85' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: right 8px center;
  }
  select:focus { outline: none; border-color: var(--blue); }
  .pill-group { display: flex; gap: 3px; }
  .pill {
    padding: 5px 11px; border-radius: 16px; font-size: 11px; font-weight: 500;
    cursor: pointer; background: var(--bg-2); color: var(--text-3);
    border: 1px solid var(--border); transition: all 0.15s; font-family: inherit;
  }
  .pill:hover { color: var(--text-2); }
  .pill.active { background: var(--blue-10); color: var(--blue); border-color: var(--blue-20); }
  .live-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-right: 4px; animation: livePulse 2s infinite; }
  @keyframes livePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .filter-spacer { flex: 1; }

  /* TBD BANNER */
  .tbd-banner {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; margin-bottom: 20px;
    background: var(--orange-10); border: 1px solid rgba(251,191,36,0.12);
    border-radius: var(--radius-xs); font-size: 12px; color: var(--orange);
  }

  /* SECTION */
  .section { margin-bottom: 32px; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-title { display: flex; align-items: center; gap: 8px; }
  .section-title h2 { font-size: 16px; font-weight: 700; }
  .section-icon {
    width: 28px; height: 28px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center; font-size: 13px;
  }
  .icon-awareness { background: var(--blue-10); color: var(--blue); }
  .icon-engagement { background: var(--purple-10); color: var(--purple); }
  .icon-traffic { background: var(--green-10); color: var(--green); }
  .section-count {
    font-size: 11px; color: var(--text-3); background: var(--bg-2);
    padding: 3px 8px; border-radius: 10px; border: 1px solid var(--border);
  }

  /* FORMULA */
  .formula {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    padding: 8px 14px; margin-bottom: 14px;
    background: var(--bg-1); border: 1px solid var(--border);
    border-radius: var(--radius-xs); font-size: 11px; color: var(--text-3);
  }
  .formula strong { color: var(--text-2); }
  .chip {
    display: inline-flex; padding: 2px 7px; border-radius: 4px;
    font-weight: 600; font-size: 10px;
  }
  .chip-blue { background: var(--blue-10); color: var(--blue); }
  .chip-purple { background: var(--purple-10); color: var(--purple); }
  .chip-green { background: var(--green-10); color: var(--green); }

  /* SUMMARY */
  .summary {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px; margin-bottom: 16px;
  }
  .summary-card {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px;
  }
  .summary-label {
    font-size: 10px; font-weight: 600; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px;
  }
  .summary-value { font-size: 22px; font-weight: 800; }
  .summary-sub { font-size: 10px; color: var(--text-3); margin-top: 1px; }

  /* AD GRID */
  .ad-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
  }

  /* AD CARD */
  .ad-card {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: all 0.2s; position: relative;
  }
  .ad-card:hover { border-color: var(--border-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }

  /* WINNER CARD */
  .ad-card.winner {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(255,215,0,0.08);
  }
  .ad-card.winner:hover {
    box-shadow: 0 0 30px rgba(255,215,0,0.12), 0 8px 24px rgba(0,0,0,0.3);
  }

  .winner-crown {
    position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
    z-index: 10; background: var(--gold); color: #000;
    font-size: 10px; font-weight: 800; padding: 3px 12px;
    border-radius: 0 0 8px 8px; letter-spacing: 0.5px;
    text-transform: uppercase;
    box-shadow: 0 2px 8px rgba(255,215,0,0.3);
  }

  /* VISUAL */
  .ad-visual {
    height: 150px; background: var(--bg-1);
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .ad-visual img { width: 100%; height: 100%; object-fit: cover; }
  .ad-visual-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    color: var(--text-3); opacity: 0.5;
  }
  .ad-visual-placeholder svg { width: 28px; height: 28px; }
  .ad-visual-placeholder span { font-size: 10px; }

  .badge-platform {
    position: absolute; top: 8px; left: 8px;
    padding: 3px 8px; border-radius: 5px;
    font-size: 10px; font-weight: 600;
    backdrop-filter: blur(8px);
  }
  .plat-instagram { background: rgba(225,48,108,0.85); color: white; }
  .plat-facebook { background: rgba(24,119,242,0.85); color: white; }
  .plat-tiktok { background: rgba(0,0,0,0.85); color: white; border: 1px solid rgba(255,255,255,0.15); }
  .plat-unknown { background: rgba(85,96,120,0.85); color: white; }

  .badge-score {
    position: absolute; top: 8px; right: 8px;
    padding: 5px 10px; border-radius: 8px;
    font-size: 20px; font-weight: 800;
    background: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .score-label {
    font-size: 8px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: rgba(255,255,255,0.5);
    display: block; text-align: center; margin-top: -1px;
  }

  /* CARD BODY */
  .ad-body { padding: 14px; }
  .ad-name {
    font-size: 12px; font-weight: 500; line-height: 1.4;
    margin-bottom: 10px; color: var(--text-1);
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
    min-height: 34px;
  }

  /* AI INSIGHT */
  .ai-insight {
    display: flex; align-items: flex-start; gap: 6px;
    padding: 7px 9px; margin-bottom: 10px;
    background: linear-gradient(135deg, rgba(83,183,232,0.06), rgba(168,85,247,0.06));
    border: 1px solid rgba(83,183,232,0.1);
    border-radius: var(--radius-xs);
    font-size: 11px; line-height: 1.45; color: var(--text-2);
  }
  .ai-insight-icon {
    flex-shrink: 0; margin-top: 1px;
    font-size: 10px; opacity: 0.7;
  }

  .ad-metrics {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    margin-bottom: 12px;
  }
  .ad-metric {
    padding: 7px 9px; background: var(--bg-1); border-radius: var(--radius-xs);
  }
  .ad-metric-label {
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.3px; color: var(--text-3); margin-bottom: 1px;
  }
  .ad-metric-value { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }

  /* CARD FOOTER */
  .ad-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 10px; border-top: 1px solid var(--border);
  }
  .boost-pill {
    padding: 4px 10px; border-radius: 14px;
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .boost-green { color: var(--green); background: var(--green-10); }
  .boost-orange { color: var(--orange); background: var(--orange-10); }
  .boost-red { color: var(--red); background: var(--red-10); }

  .bench-tbd {
    font-size: 10px; color: var(--text-3); padding: 3px 7px;
    background: var(--bg-1); border-radius: 4px;
  }

  /* SPARKLINE */
  .sparkline-wrap {
    margin-bottom: 12px; padding: 8px 9px;
    background: var(--bg-1); border-radius: var(--radius-xs);
  }
  .sparkline-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 5px;
  }
  .sparkline-title {
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.3px; color: var(--text-3);
  }
  .sparkline-trend {
    font-size: 10px; font-weight: 700; display: flex; align-items: center; gap: 3px;
  }
  .sparkline-trend.up { color: var(--green); }
  .sparkline-trend.down { color: var(--red); }
  .sparkline-trend.flat { color: var(--text-3); }
  .sparkline-svg { display: block; width: 100%; height: 32px; }
  .sparkline-empty {
    font-size: 9px; color: var(--text-3); opacity: 0.6;
    text-align: center; padding: 6px 0;
  }

  /* COMPARE VIEW */
  .compare-group {
    margin-bottom: 20px; background: var(--bg-2);
    border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden;
  }
  .compare-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    background: var(--bg-1);
  }
  .compare-thumb {
    width: 48px; height: 48px; border-radius: 8px;
    object-fit: cover; flex-shrink: 0;
  }
  .compare-thumb-placeholder {
    width: 48px; height: 48px; border-radius: 8px;
    background: var(--bg-3); display: flex; align-items: center;
    justify-content: center; color: var(--text-3); font-size: 16px; flex-shrink: 0;
  }
  .compare-ad-info { flex: 1; min-width: 0; }
  .compare-ad-name {
    font-size: 12px; font-weight: 600; color: var(--text-1);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .compare-ad-type {
    font-size: 10px; color: var(--text-3); margin-top: 2px;
  }
  .compare-table {
    width: 100%; border-collapse: collapse;
  }
  .compare-table th {
    padding: 8px 12px; font-size: 9px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.4px;
    color: var(--text-3); text-align: left;
    border-bottom: 1px solid var(--border); background: var(--bg-1);
  }
  .compare-table td {
    padding: 10px 12px; font-size: 13px; font-weight: 600;
    color: var(--text-1); border-bottom: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }
  .compare-table tr:last-child td { border-bottom: none; }
  .compare-table tr:hover td { background: var(--bg-hover); }
  .compare-plat-cell {
    display: flex; align-items: center; gap: 6px;
  }
  .compare-plat-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .dot-instagram { background: #E1306C; }
  .dot-facebook { background: #1877F2; }
  .dot-tiktok { background: #fff; border: 1px solid #555; }
  .dot-unknown { background: #556078; }
  .compare-winner-cell {
    color: var(--gold); font-weight: 800;
  }
  .compare-best {
    font-size: 8px; font-weight: 700; color: var(--gold);
    background: rgba(255,215,0,0.1); padding: 1px 5px;
    border-radius: 3px; margin-left: 4px; text-transform: uppercase;
  }
  .compare-insight {
    padding: 10px 16px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text-2); line-height: 1.4;
    background: linear-gradient(135deg, rgba(83,183,232,0.03), rgba(168,85,247,0.03));
  }
  .compare-empty {
    padding: 10px 16px; font-size: 11px; color: var(--text-3);
    text-align: center;
  }
  .compare-stat {
    background: var(--bg-1); border-radius: var(--radius-xs);
    padding: 10px 12px; text-align: center;
  }

  /* EMPTY */
  .empty {
    text-align: center; padding: 40px; color: var(--text-3);
    border: 1px dashed var(--border); border-radius: var(--radius);
    background: var(--bg-1);
  }
  .empty h3 { font-size: 14px; color: var(--text-2); margin-bottom: 3px; }
  .empty p { font-size: 12px; }

  /* LOADING */
  .loading {
    display: flex; align-items: center; justify-content: center;
    padding: 60px; color: var(--text-3); font-size: 13px;
  }
  .spinner {
    width: 16px; height: 16px; border: 2px solid var(--border);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin 0.7s linear infinite; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

  @media (max-width: 768px) {
    .container { padding: 14px; }
    .topnav { padding: 10px 14px; }
    .ad-grid { grid-template-columns: 1fr; }
    .filters-bar { flex-direction: column; align-items: stretch; }
    .summary { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-left">
    <div class="logo">
      <img src="/assets/White fibreguard logo.png" alt="FibreGuard">
    </div>
    <div class="logo-sep"></div>
    <span class="logo-sub">Ad Performance</span>
  </div>
  <div class="topnav-right">
    <span class="meta-text" id="lastUpdated"></span>
    <button class="btn" onclick="loadData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Refresh
    </button>
  </div>
</nav>

<div class="container">

  <div class="filters-bar">
    <div class="filter-group">
      <span class="filter-label">Platform</span>
      <select id="filterPlatform" onchange="applyFilters()">
        <option value="all">All Platforms</option>
        <option value="instagram" selected>Instagram</option>
        <option value="facebook">Facebook</option>
        <option value="tiktok">TikTok</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Campaign</span>
      <select id="filterCampaign" onchange="applyFilters()">
        <option value="all">All Campaigns</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">View</span>
      <div class="pill-group" id="viewPills">
        <button class="pill active" onclick="setView('latest', this)"><span class="live-dot"></span>Live</button>
        <button class="pill" onclick="setView('compare', this)">Compare</button>
        <button class="pill" onclick="setView(1, this)">1h</button>
        <button class="pill" onclick="setView(6, this)">6h</button>
        <button class="pill" onclick="setView(12, this)">12h</button>
        <button class="pill" onclick="setView(24, this)">24h</button>
        <button class="pill" onclick="setView(48, this)">48h</button>
      </div>
    </div>
    <div class="filter-spacer"></div>
    <div class="filter-group">
      <span class="filter-label">Sort</span>
      <select id="filterSort" onchange="applyFilters()">
        <option value="score_desc">Score: High to Low</option>
        <option value="score_asc">Score: Low to High</option>
        <option value="reach_desc">Reach: High to Low</option>
        <option value="impressions_desc">Impressions: High to Low</option>
      </select>
    </div>
  </div>

  <div class="tbd-banner">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
    <span><strong>Benchmarks: TBD</strong> — Collecting data across campaigns. Scores are relative to the current ad group (0–100 scale). Boost thresholds will be refined as more data comes in.</span>
  </div>

  <div id="dashboardContent">
    <div class="loading"><div class="spinner"></div> Loading...</div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://kulalbfnfugauwpjukze.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1bGFsYmZuZnVnYXV3cGp1a3plIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzM5NTQyMSwiZXhwIjoyMDg4OTcxNDIxfQ.QucqQ-nIqrkoRycB6RFjU3joknfSsn1HFJ7Sdk1mQgU';

  async function sbFetch(table, q = '') {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${q}`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message || `HTTP ${res.status}`); }
    return res.json();
  }

  let allData = [];       // Supabase historical data (for sparklines + snapshots)
  let liveData = [];       // Real-time data from Meta API
  let currentView = 'latest';

  // Detect the base URL for server endpoints (same origin as the page)
  const SERVER_BASE = window.location.origin;

  // ====== CLIENT-SIDE 0-100 SCORING ======
  // Recalculates scores from raw metrics so old data is also correct
  function normHigher(val, min, max) { return max === min ? 50 : ((val - min) / (max - min)) * 100; }
  function normLower(val, min, max) { return max === min ? 50 : ((max - val) / (max - min)) * 100; }

  function recalcScores(ads) {
    // Awareness ads
    const aw = ads.filter(d => d.campaign_type === 'awareness');
    if (aw.length >= 2) {
      const rMin = Math.min(...aw.map(d=>d.reach||0)), rMax = Math.max(...aw.map(d=>d.reach||0));
      const cMin = Math.min(...aw.map(d=>d.cpm||0)), cMax = Math.max(...aw.map(d=>d.cpm||0));
      const vMin = Math.min(...aw.map(d=>d.video_3s_view_rate||0)), vMax = Math.max(...aw.map(d=>d.video_3s_view_rate||0));
      for (const d of aw) {
        d._score = Math.round(
          normHigher(d.reach||0, rMin, rMax) * 0.4 +
          normLower(d.cpm||0, cMin, cMax) * 0.4 +
          normHigher(d.video_3s_view_rate||0, vMin, vMax) * 0.2
        );
        d._boost = d._score >= 70 ? 'boost' : d._score >= 40 ? 'monitor' : 'no boost';
      }
    } else {
      // Not enough ads to compare — show TBD
      for (const d of aw) { d._score = null; d._boost = 'tbd'; }
    }

    // Engagement ads
    const en = ads.filter(d => d.campaign_type === 'engagement');
    if (en.length >= 2) {
      const shMin = Math.min(...en.map(d=>d.shares||0)), shMax = Math.max(...en.map(d=>d.shares||0));
      const svMin = Math.min(...en.map(d=>d.saves||0)), svMax = Math.max(...en.map(d=>d.saves||0));
      const coMin = Math.min(...en.map(d=>d.comments||0)), coMax = Math.max(...en.map(d=>d.comments||0));
      const liMin = Math.min(...en.map(d=>d.likes||0)), liMax = Math.max(...en.map(d=>d.likes||0));
      for (const d of en) {
        d._score = Math.round(
          normHigher(d.shares||0, shMin, shMax) * 0.4 +
          normHigher(d.saves||0, svMin, svMax) * 0.3 +
          normHigher(d.comments||0, coMin, coMax) * 0.2 +
          normHigher(d.likes||0, liMin, liMax) * 0.1
        );
        d._boost = d._score >= 70 ? 'boost' : d._score >= 40 ? 'monitor' : 'no boost';
      }
    } else {
      for (const d of en) { d._score = null; d._boost = 'tbd'; }
    }

    // Traffic ads: CTR 40% + Link Clicks 30% + CPM (lower=better) 20% + Reach 10%
    const tr = ads.filter(d => d.campaign_type === 'traffic');
    if (tr.length >= 2) {
      const ctrMin = Math.min(...tr.map(d=>d.ctr||0)), ctrMax = Math.max(...tr.map(d=>d.ctr||0));
      const clMin = Math.min(...tr.map(d=>d.link_clicks||0)), clMax = Math.max(...tr.map(d=>d.link_clicks||0));
      const cpmMin = Math.min(...tr.map(d=>d.cpm||0)), cpmMax = Math.max(...tr.map(d=>d.cpm||0));
      const rMin = Math.min(...tr.map(d=>d.reach||0)), rMax = Math.max(...tr.map(d=>d.reach||0));
      for (const d of tr) {
        d._score = Math.round(
          normHigher(d.ctr||0, ctrMin, ctrMax) * 0.4 +
          normHigher(d.link_clicks||0, clMin, clMax) * 0.3 +
          normLower(d.cpm||0, cpmMin, cpmMax) * 0.2 +
          normHigher(d.reach||0, rMin, rMax) * 0.1
        );
        d._boost = d._score >= 70 ? 'boost' : d._score >= 40 ? 'monitor' : 'no boost';
      }
    } else if (tr.length === 1) {
      for (const d of tr) { d._score = null; d._boost = 'tbd'; }
    }
  }

  document.addEventListener('DOMContentLoaded', () => loadData());

  async function loadData() {
    document.getElementById('dashboardContent').innerHTML = '<div class="loading"><div class="spinner"></div> Fetching live data from Meta...</div>';
    try {
      // Fetch live data from Meta API and historical data from Supabase in parallel
      const [liveRes, historicalData] = await Promise.all([
        fetch(`${SERVER_BASE}/live`).then(r => r.json()),
        sbFetch('ad_snapshots', 'select=*&order=captured_at.desc')
      ]);

      liveData = (liveRes.data || [])
        .filter(d => d.publisher_platform && d.publisher_platform !== 'unknown');
      allData = historicalData
        .filter(d => d.publisher_platform && d.publisher_platform !== 'unknown');

      populateFilters();
      applyFilters();
      updateTimestamp();
    } catch (err) {
      document.getElementById('dashboardContent').innerHTML = `<div class="empty"><h3>Failed to load</h3><p>${err.message}</p></div>`;
    }
  }

  function updateTimestamp() {
    const el = document.getElementById('lastUpdated');
    if (currentView === 'latest' && liveData.length > 0) {
      el.textContent = `Live data \u2022 ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
    } else if (allData.length > 0) {
      const d = new Date(allData[0].captured_at);
      el.textContent = `Last capture: ${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
    }
  }

  function populateFilters() {
    const sel = document.getElementById('filterCampaign');
    // Combine live + historical campaigns for the dropdown
    const campaigns = [...new Set([...liveData, ...allData].map(d => d.campaign_name))];
    sel.innerHTML = '<option value="all">All Campaigns</option>';
    campaigns.forEach(c => {
      const o = document.createElement('option');
      o.value = c;
      o.textContent = c.length > 55 ? c.substring(0, 55) + '...' : c;
      sel.appendChild(o);
    });
  }

  function setView(v, el) {
    currentView = v;
    document.querySelectorAll('#viewPills .pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    applyFilters();
  }

  async function applyFilters() {
    const platform = document.getElementById('filterPlatform').value;
    const campaign = document.getElementById('filterCampaign').value;
    const sort = document.getElementById('filterSort').value;

    // Compare view: use live data for real-time comparison
    if (currentView === 'compare') {
      const sourceData = liveData.length > 0 ? liveData : allData;
      const latestMap = new Map();
      for (const d of sourceData) {
        const key = `${d.ad_name}__${d.publisher_platform}`;
        if (!latestMap.has(key) || new Date(d.captured_at) > new Date(latestMap.get(key).captured_at)) {
          latestMap.set(key, d);
        }
      }
      let all = [...latestMap.values()];
      if (campaign !== 'all') all = all.filter(d => d.campaign_name === campaign);

      renderCompare(all);
      return;
    }

    let filtered;

    if (currentView === 'latest') {
      // Use live data from Meta API (real-time)
      filtered = [...liveData];
      updateTimestamp();
    } else {
      // Time window: fetch snapshot from Supabase via server endpoint
      const hours = currentView;
      const content = document.getElementById('dashboardContent');
      content.innerHTML = `<div class="loading"><div class="spinner"></div> Loading ${hours}h snapshot...</div>`;

      try {
        const res = await fetch(`${SERVER_BASE}/snapshot/${hours}`);
        const json = await res.json();
        filtered = (json.data || []).filter(d => d.publisher_platform && d.publisher_platform !== 'unknown');

        // Update timestamp to show snapshot time
        const el = document.getElementById('lastUpdated');
        if (json.actual_time) {
          const d = new Date(json.actual_time);
          el.textContent = `Snapshot: ${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
        }
      } catch (err) {
        content.innerHTML = `<div class="empty"><h3>Failed to load snapshot</h3><p>${err.message}</p></div>`;
        return;
      }
    }

    // Apply platform + campaign filters
    filtered = filtered.filter(d => {
      if (platform !== 'all' && d.publisher_platform !== platform) return false;
      if (campaign !== 'all' && d.campaign_name !== campaign) return false;
      return true;
    });

    // Recalculate scores client-side (0-100 normalized)
    recalcScores(filtered);

    const awareness = filtered.filter(d => d.campaign_type === 'awareness');
    const engagement = filtered.filter(d => d.campaign_type === 'engagement');
    const traffic = filtered.filter(d => d.campaign_type === 'traffic');

    sortAds(awareness, sort);
    sortAds(engagement, sort);
    sortAds(traffic, sort);

    render(awareness, engagement, traffic);
  }

  function sortAds(arr, sort) {
    arr.sort((a, b) => {
      const sa = a._score ?? -1;
      const sb = b._score ?? -1;
      switch(sort) {
        case 'score_asc': return sa - sb;
        case 'reach_desc': return (b.reach||0) - (a.reach||0);
        case 'impressions_desc': return (b.impressions||0) - (a.impressions||0);
        default: return sb - sa;
      }
    });
  }

  // ====== RENDER ======
  function render(awareness, engagement, traffic) {
    const c = document.getElementById('dashboardContent');
    let h = '';

    h += buildSection({
      type: 'awareness', title: 'Awareness Campaigns', sub: 'Entertaining content',
      iconClass: 'icon-awareness', icon: '\u25C9',
      formula: [['Reach','40%'],['CPM','40%'],['3s View Rate','20%']],
      chipClass: 'chip-blue', ads: awareness, scoreKey: 'awareness_score',
      metrics: d => [
        ['Reach', fmt(d.reach)], ['CPM', '$'+(d.cpm||0).toFixed(3)],
        ['3s Views', fmt(d.video_3s_views)], ['3s View Rate', (d.video_3s_view_rate||0).toFixed(1)+'%']
      ],
      summaryExtras: ads => {
        const r = ads.reduce((s,d)=>s+(d.reach||0),0);
        const cpm = ads.reduce((s,d)=>s+(d.cpm||0),0)/ads.length;
        return [['Total Reach', fmt(r)], ['Avg CPM', '$'+cpm.toFixed(3)]];
      }
    });

    h += buildSection({
      type: 'engagement', title: 'Engagement Campaigns', sub: 'Educational content',
      iconClass: 'icon-engagement', icon: '\u2665',
      formula: [['Shares','40%'],['Saves','30%'],['Comments','20%'],['Likes','10%']],
      chipClass: 'chip-purple', ads: engagement, scoreKey: 'engagement_score',
      metrics: d => [
        ['Shares', fmt(d.shares)], ['Saves', fmt(d.saves)],
        ['Comments', fmt(d.comments)], ['Likes', fmt(d.likes)]
      ],
      summaryExtras: ads => {
        const sh = ads.reduce((s,d)=>s+(d.shares||0),0);
        const sv = ads.reduce((s,d)=>s+(d.saves||0),0);
        return [['Total Shares', fmt(sh)], ['Total Saves', fmt(sv)]];
      }
    });

    h += buildSection({
      type: 'traffic', title: 'Traffic Campaigns', sub: 'Link click driven',
      iconClass: 'icon-traffic', icon: '\u2197',
      formula: [['CTR','40%'],['Clicks','30%'],['CPM','20%'],['Reach','10%']],
      chipClass: 'chip-green', ads: traffic, scoreKey: 'traffic_score',
      metrics: d => [
        ['Link Clicks', fmt(d.link_clicks)], ['CTR', (d.ctr||0).toFixed(2)+'%'],
        ['Reach', fmt(d.reach)], ['CPM', '$'+(d.cpm||0).toFixed(3)]
      ],
      summaryExtras: ads => {
        const clicks = ads.reduce((s,d)=>s+(d.link_clicks||0),0);
        const avgCtr = ads.reduce((s,d)=>s+(d.ctr||0),0)/ads.length;
        return [['Total Clicks', fmt(clicks)], ['Avg CTR', avgCtr.toFixed(2)+'%']];
      }
    });

    c.innerHTML = h;
  }

  function buildSection({type, title, sub, iconClass, icon, formula, chipClass, ads, scoreKey, metrics, summaryExtras}) {
    let h = `<div class="section">`;
    const hasTBD = ads.length > 0 && ads[0]._score === null;

    h += `<div class="section-header">
      <div class="section-title">
        <div class="section-icon ${iconClass}">${icon}</div>
        <h2>${title}</h2>
        <span class="section-count">${ads.length} ad${ads.length!==1?'s':''}</span>
      </div>
      <span style="font-size:12px; color:var(--text-3)">${sub}</span>
    </div>`;

    // Formula
    h += `<div class="formula"><strong>Score =</strong> `;
    formula.forEach(([label, weight], i) => {
      if (i > 0) h += ` <span style="color:var(--text-3)">+</span> `;
      h += `<span class="chip ${chipClass}">${label} ${weight}</span>`;
    });
    if (hasTBD) h += `<span style="margin-left:auto; font-size:10px; color:var(--orange)">Need 2+ ads to calculate scores</span>`;
    h += `</div>`;

    if (ads.length === 0) {
      h += `<div class="empty"><h3>No ${type} ads found</h3><p>No data for current filters.</p></div></div>`;
      return h;
    }

    // Summary
    const scoredAds = ads.filter(d => d._score !== null);
    const avgScore = scoredAds.length > 0 ? scoredAds.reduce((s,d) => s + d._score, 0) / scoredAds.length : null;
    const boost = ads.filter(d => d._boost === 'boost').length;
    const monitor = ads.filter(d => d._boost === 'monitor').length;
    const noBoost = ads.filter(d => d._boost === 'no boost').length;
    const extras = summaryExtras(ads);

    h += `<div class="summary">`;
    if (avgScore !== null) {
      h += `<div class="summary-card"><div class="summary-label">Avg Score</div><div class="summary-value" style="color:${sColor(avgScore)}">${avgScore.toFixed(0)}<span style="font-size:12px;color:var(--text-3)">/100</span></div></div>`;
    } else {
      h += `<div class="summary-card"><div class="summary-label">Avg Score</div><div class="summary-value" style="color:var(--text-3)">TBD</div><div class="summary-sub">Need more ads</div></div>`;
    }
    h += `<div class="summary-card"><div class="summary-label">Boost</div><div class="summary-value" style="color:var(--green)">${boost}</div></div>`;
    h += `<div class="summary-card"><div class="summary-label">Monitor</div><div class="summary-value" style="color:var(--orange)">${monitor}</div></div>`;
    h += `<div class="summary-card"><div class="summary-label">No Boost</div><div class="summary-value" style="color:var(--red)">${noBoost}</div></div>`;
    extras.forEach(([l,v]) => {
      h += `<div class="summary-card"><div class="summary-label">${l}</div><div class="summary-value">${v}</div></div>`;
    });
    h += `</div>`;

    // Ad cards
    const scoredCards = ads.filter(d => d._score !== null);
    const topScore = scoredCards.length > 0 ? Math.max(...scoredCards.map(d => d._score)) : null;

    h += `<div class="ad-grid">`;
    ads.forEach((d, i) => {
      const score = d._score;
      const isTBD = score === null;
      const isWinner = !isTBD && score === topScore && ads.length > 1;
      const m = metrics(d);
      const boostClass = d._boost === 'boost' ? 'boost-green' : d._boost === 'monitor' ? 'boost-orange' : d._boost === 'tbd' ? '' : 'boost-red';
      const boostLabel = d._boost === 'no boost' ? 'No Boost' : d._boost === 'tbd' ? 'TBD' : cap(d._boost);
      const platClass = 'plat-' + (d.publisher_platform || 'unknown');
      const platLabel = cap(d.publisher_platform || 'unknown');
      const hasThumb = d.thumbnail_url && d.thumbnail_url.startsWith('http');

      h += `<div class="ad-card ${isWinner ? 'winner' : ''}">`;
      if (isWinner) h += `<div class="winner-crown">\u2605 Top Performer</div>`;

      // Visual
      h += `<div class="ad-visual">`;
      if (hasThumb) {
        h += `<img src="${esc(d.thumbnail_url)}" alt="Ad" loading="lazy">`;
      } else {
        h += `<div class="ad-visual-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>Ad creative</span></div>`;
      }
      h += `<span class="badge-platform ${platClass}">${platLabel}</span>`;
      if (!isTBD) {
        h += `<span class="badge-score" style="color:${sColor(score)}"><span>${score}</span><span class="score-label">/100</span></span>`;
      } else {
        h += `<span class="badge-score" style="color:var(--text-3)"><span style="font-size:14px">TBD</span></span>`;
      }
      h += `</div>`;

      // Body
      h += `<div class="ad-body">`;
      h += `<div class="ad-name" title="${esc(d.ad_name)}">${esc(d.ad_name)}</div>`;

      // AI Insight
      if (d.ai_insight) {
        h += `<div class="ai-insight"><span class="ai-insight-icon">\u2728</span><span>${esc(d.ai_insight)}</span></div>`;
      }

      h += `<div class="ad-metrics">`;
      m.forEach(([label, value]) => {
        h += `<div class="ad-metric"><div class="ad-metric-label">${label}</div><div class="ad-metric-value">${value}</div></div>`;
      });
      h += `</div>`;

      // Sparkline
      h += buildSparkline(d);

      // Footer
      h += `<div class="ad-footer">`;
      if (d._boost === 'tbd') {
        h += `<span class="bench-tbd">Score: TBD</span>`;
      } else {
        h += `<span class="boost-pill ${boostClass}">${boostLabel}</span>`;
      }
      h += `<span class="bench-tbd">Benchmark: TBD</span>`;
      h += `</div>`;

      h += `</div></div>`; // close ad-body, ad-card
    });
    h += `</div>`;

    h += `</div>`; // close section
    return h;
  }

  // ====== COMPARE VIEW ======
  function renderCompare(ads) {
    const c = document.getElementById('dashboardContent');

    // Group by ad_name
    const groups = new Map();
    for (const d of ads) {
      if (!groups.has(d.ad_name)) groups.set(d.ad_name, []);
      groups.get(d.ad_name).push(d);
    }

    // Only show ads that appear on 2+ platforms
    const multiPlatform = [...groups.entries()].filter(([, items]) => {
      const platforms = new Set(items.map(d => d.publisher_platform));
      return platforms.size >= 2;
    });

    if (multiPlatform.length === 0) {
      c.innerHTML = `<div class="section">
        <div class="section-header">
          <div class="section-title">
            <div class="section-icon icon-awareness">\u2194</div>
            <h2>Platform Comparison</h2>
          </div>
        </div>
        <div class="empty"><h3>No cross-platform data</h3><p>Comparison requires the same ad running on 2+ platforms.</p></div>
      </div>`;
      return;
    }

    let h = `<div class="section">
      <div class="section-header">
        <div class="section-title">
          <div class="section-icon icon-awareness">\u2194</div>
          <h2>Platform Comparison</h2>
          <span class="section-count">${multiPlatform.length} ad${multiPlatform.length!==1?'s':''}</span>
        </div>
        <span style="font-size:12px; color:var(--text-3)">Same ad across platforms</span>
      </div>`;

    for (const [adName, items] of multiPlatform) {
      const isAwareness = items[0].campaign_type === 'awareness';
      const thumb = items.find(d => d.thumbnail_url)?.thumbnail_url;

      h += `<div class="compare-group">`;

      // Header with thumbnail and ad name
      h += `<div class="compare-header">`;
      if (thumb) {
        h += `<img class="compare-thumb" src="${esc(thumb)}" alt="">`;
      } else {
        h += `<div class="compare-thumb-placeholder">\u25A3</div>`;
      }
      h += `<div class="compare-ad-info">
        <div class="compare-ad-name" title="${esc(adName)}">${esc(adName)}</div>
        <div class="compare-ad-type">${isAwareness ? 'Awareness' : isTraffic ? 'Traffic' : 'Engagement'} campaign</div>
      </div></div>`;

      // Table
      h += `<table class="compare-table">`;

      const isTraffic = items[0].campaign_type === 'traffic';

      if (isAwareness) {
        h += `<tr><th>Platform</th><th>Reach</th><th>CPM</th><th>3s View Rate</th><th>Impressions</th><th>Score</th></tr>`;
        const bestReach = Math.max(...items.map(d => d.reach || 0));
        const bestCpm = Math.min(...items.filter(d => d.cpm > 0).map(d => d.cpm));
        const bestVr = Math.max(...items.map(d => d.video_3s_view_rate || 0));

        for (const d of items.sort((a,b) => (b.reach||0) - (a.reach||0))) {
          const platDot = 'dot-' + (d.publisher_platform || 'unknown');
          h += `<tr>`;
          h += `<td><div class="compare-plat-cell"><span class="compare-plat-dot ${platDot}"></span>${cap(d.publisher_platform || 'unknown')}</div></td>`;
          h += `<td>${fmt(d.reach)}${d.reach === bestReach && items.length > 1 ? '<span class="compare-best">Best</span>' : ''}</td>`;
          h += `<td>$${(d.cpm||0).toFixed(3)}${d.cpm === bestCpm && items.length > 1 ? '<span class="compare-best">Best</span>' : ''}</td>`;
          h += `<td>${(d.video_3s_view_rate||0).toFixed(1)}%${d.video_3s_view_rate === bestVr && items.length > 1 ? '<span class="compare-best">Best</span>' : ''}</td>`;
          h += `<td>${fmt(d.impressions)}</td>`;
          h += `<td style="color:${d.awareness_score ? sColor(d.awareness_score) : 'var(--text-3)'}">${d.awareness_score ?? 'N/A'}</td>`;
          h += `</tr>`;
        }
      } else if (isTraffic) {
        h += `<tr><th>Platform</th><th>Link Clicks</th><th>CTR</th><th>CPM</th><th>Reach</th><th>Score</th></tr>`;
        const bestClicks = Math.max(...items.map(d => d.link_clicks || 0));
        const bestCtr = Math.max(...items.map(d => d.ctr || 0));
        const bestCpm = Math.min(...items.filter(d => d.cpm > 0).map(d => d.cpm));

        for (const d of items.sort((a,b) => (b.link_clicks||0) - (a.link_clicks||0))) {
          const platDot = 'dot-' + (d.publisher_platform || 'unknown');
          h += `<tr>`;
          h += `<td><div class="compare-plat-cell"><span class="compare-plat-dot ${platDot}"></span>${cap(d.publisher_platform || 'unknown')}</div></td>`;
          h += `<td>${fmt(d.link_clicks)}${d.link_clicks === bestClicks && items.length > 1 ? '<span class="compare-best">Best</span>' : ''}</td>`;
          h += `<td>${(d.ctr||0).toFixed(2)}%${d.ctr === bestCtr && items.length > 1 ? '<span class="compare-best">Best</span>' : ''}</td>`;
          h += `<td>$${(d.cpm||0).toFixed(3)}${d.cpm === bestCpm && items.length > 1 ? '<span class="compare-best">Best</span>' : ''}</td>`;
          h += `<td>${fmt(d.reach)}</td>`;
          h += `<td style="color:${d.traffic_score ? sColor(d.traffic_score) : 'var(--text-3)'}">${d.traffic_score ?? 'N/A'}</td>`;
          h += `</tr>`;
        }
      } else {
        h += `<tr><th>Platform</th><th>Shares</th><th>Saves</th><th>Comments</th><th>Likes</th><th>Score</th></tr>`;
        const bestShares = Math.max(...items.map(d => d.shares || 0));
        const bestSaves = Math.max(...items.map(d => d.saves || 0));

        for (const d of items.sort((a,b) => ((b.shares||0)+(b.saves||0)) - ((a.shares||0)+(a.saves||0)))) {
          const platDot = 'dot-' + (d.publisher_platform || 'unknown');
          h += `<tr>`;
          h += `<td><div class="compare-plat-cell"><span class="compare-plat-dot ${platDot}"></span>${cap(d.publisher_platform || 'unknown')}</div></td>`;
          h += `<td>${fmt(d.shares)}${d.shares === bestShares && items.length > 1 ? '<span class="compare-best">Best</span>' : ''}</td>`;
          h += `<td>${fmt(d.saves)}${d.saves === bestSaves && items.length > 1 ? '<span class="compare-best">Best</span>' : ''}</td>`;
          h += `<td>${fmt(d.comments)}</td>`;
          h += `<td>${fmt(d.likes)}</td>`;
          h += `<td style="color:${d.engagement_score ? sColor(d.engagement_score) : 'var(--text-3)'}">${d.engagement_score ?? 'N/A'}</td>`;
          h += `</tr>`;
        }
      }

      h += `</table>`;

      // Show AI insight from the best-performing platform
      const bestItem = items.reduce((a, b) => {
        const sa = a.awareness_score ?? a.engagement_score ?? a.traffic_score ?? 0;
        const sb = b.awareness_score ?? b.engagement_score ?? b.traffic_score ?? 0;
        return sb > sa ? b : a;
      });
      if (bestItem.ai_insight) {
        h += `<div class="compare-insight">\u2728 ${esc(bestItem.ai_insight)}</div>`;
      }

      h += `</div>`; // close compare-group
    }

    // Also show single-platform ads as a note
    const singlePlatform = [...groups.entries()].filter(([, items]) => {
      const platforms = new Set(items.map(d => d.publisher_platform));
      return platforms.size < 2;
    });
    if (singlePlatform.length > 0) {
      h += `<div class="compare-empty" style="margin-top:12px; padding:14px; background:var(--bg-1); border:1px solid var(--border); border-radius:var(--radius-xs);">
        <span style="color:var(--text-3)">${singlePlatform.length} ad${singlePlatform.length!==1?'s':''} running on a single platform only — not shown in comparison</span>
      </div>`;
    }

    h += `</div>`; // close section

    // ====== CAMPAIGN TYPE COMPARISON ======
    const awarenessAds = ads.filter(d => d.campaign_type === 'awareness');
    const engagementAds = ads.filter(d => d.campaign_type === 'engagement');
    const trafficAds = ads.filter(d => d.campaign_type === 'traffic');

    // Build campaign type cards dynamically
    const typeCards = [];
    if (awarenessAds.length > 0) {
      const a = awarenessAds;
      typeCards.push({
        label: 'Awareness', icon: '\u{1F4E3}', iconClass: 'icon-awareness', color: 'var(--blue)',
        count: a.length,
        boostReady: a.filter(d => (d.awareness_score || 0) >= 70).length,
        avgScore: Math.round(a.reduce((s,d) => s+(d.awareness_score||0),0)/a.length),
        totalImpressions: a.reduce((s,d) => s+(d.impressions||0),0),
        stats: [
          ['Total Reach', fmt(a.reduce((s,d)=>s+(d.reach||0),0)), true],
          ['Avg CPM', '$'+(a.reduce((s,d)=>s+(d.cpm||0),0)/a.length).toFixed(3), false],
          ['Avg View Rate', (a.reduce((s,d)=>s+(d.video_3s_view_rate||0),0)/a.length).toFixed(1)+'%', false]
        ]
      });
    }
    if (engagementAds.length > 0) {
      const e = engagementAds;
      typeCards.push({
        label: 'Engagement', icon: '\u{1F4AC}', iconClass: 'icon-engagement', color: 'var(--purple)',
        count: e.length,
        boostReady: e.filter(d => (d.engagement_score || 0) >= 70).length,
        avgScore: Math.round(e.reduce((s,d) => s+(d.engagement_score||0),0)/e.length),
        totalImpressions: e.reduce((s,d) => s+(d.impressions||0),0),
        stats: [
          ['Shares+Saves', fmt(e.reduce((s,d)=>s+(d.shares||0)+(d.saves||0),0)), true],
          ['Comments', fmt(e.reduce((s,d)=>s+(d.comments||0),0)), false],
          ['Likes', fmt(e.reduce((s,d)=>s+(d.likes||0),0)), false]
        ]
      });
    }
    if (trafficAds.length > 0) {
      const t = trafficAds;
      typeCards.push({
        label: 'Traffic', icon: '\u{1F517}', iconClass: 'icon-traffic', color: 'var(--green)',
        count: t.length,
        boostReady: t.filter(d => (d.traffic_score || 0) >= 70).length,
        avgScore: Math.round(t.reduce((s,d) => s+(d.traffic_score||0),0)/t.length),
        totalImpressions: t.reduce((s,d) => s+(d.impressions||0),0),
        stats: [
          ['Total Clicks', fmt(t.reduce((s,d)=>s+(d.link_clicks||0),0)), true],
          ['Avg CTR', (t.reduce((s,d)=>s+(d.ctr||0),0)/t.length).toFixed(2)+'%', false],
          ['Avg CPM', '$'+(t.reduce((s,d)=>s+(d.cpm||0),0)/t.length).toFixed(3), false]
        ]
      });
    }

    if (typeCards.length >= 2) {
      const cols = typeCards.length === 3 ? '1fr 1fr 1fr' : '1fr 1fr';
      h += `<div class="section" style="margin-top:24px">
        <div class="section-header">
          <div class="section-title">
            <div class="section-icon" style="background:var(--purple-10); color:var(--purple)">\u26A1</div>
            <h2>Campaign Type Comparison</h2>
          </div>
          <span style="font-size:12px; color:var(--text-3)">Performance across campaign objectives</span>
        </div>
        <div class="compare-group">
          <div style="display:grid; grid-template-columns:${cols}; gap:16px;">`;

      for (const tc of typeCards) {
        h += `<div style="background:var(--bg-2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:18px;">
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:14px;">
            <div class="section-icon ${tc.iconClass}" style="width:28px; height:28px; font-size:13px;">${tc.icon}</div>
            <div>
              <div style="font-weight:600; color:var(--text-1);">${tc.label}</div>
              <div style="font-size:11px; color:var(--text-3)">${tc.count} ad${tc.count!==1?'s':''} \u2022 ${tc.boostReady} boost-ready</div>
            </div>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div class="compare-stat">
              <div style="font-size:11px; color:var(--text-3)">Avg Score</div>
              <div style="font-size:20px; font-weight:700; color:${sColor(tc.avgScore)}">${tc.avgScore}</div>
            </div>`;
        for (const [label, value, big] of tc.stats) {
          h += `<div class="compare-stat">
              <div style="font-size:11px; color:var(--text-3)">${label}</div>
              <div style="font-size:${big?'20':'16'}px; font-weight:${big?'700':'600'}; color:var(--text-1)">${value}</div>
            </div>`;
        }
        h += `</div></div>`;
      }

      h += `</div>
          <!-- Impressions comparison bar -->
          <div style="margin-top:14px; background:var(--bg-1); border:1px solid var(--border); border-radius:var(--radius-xs); padding:14px;">
            <div style="font-size:12px; font-weight:600; color:var(--text-2); margin-bottom:10px;">Total Impressions</div>
            <div style="display:flex; justify-content:center; align-items:center; gap:16px; flex-wrap:wrap;">`;
      for (const tc of typeCards) {
        h += `<div style="text-align:center;">
                <div style="font-size:18px; font-weight:700; color:${tc.color}">${fmt(tc.totalImpressions)}</div>
                <div style="font-size:11px; color:var(--text-3)">${tc.label}</div>
              </div>`;
      }
      h += `</div></div></div></div>`;
    } else if (typeCards.length === 1) {
      const activeTypes = typeCards.map(t => t.label).join(', ');
      h += `<div class="section" style="margin-top:24px">
        <div class="section-header">
          <div class="section-title">
            <div class="section-icon" style="background:var(--purple-10); color:var(--purple)">\u26A1</div>
            <h2>Campaign Type Comparison</h2>
          </div>
        </div>
        <div class="empty"><h3>Only ${activeTypes} ads available</h3><p>Campaign comparison will appear once 2+ campaign types are running.</p></div>
      </div>`;
    }

    c.innerHTML = h;
  }

  // ====== SPARKLINE ======
  // Collects all snapshots for a given ad+platform across time, sorted chronologically
  // Uses historical Supabase data + current live data point for the trend line
  function getSparklineData(ad) {
    const historical = allData
      .filter(d => d.ad_name === ad.ad_name && d.publisher_platform === ad.publisher_platform)
      .sort((a, b) => new Date(a.captured_at) - new Date(b.captured_at));

    // If we're on live view, append the current live data point so sparkline shows up-to-now
    if (currentView === 'latest' && liveData.length > 0) {
      const livePoint = liveData.find(d => d.ad_name === ad.ad_name && d.publisher_platform === ad.publisher_platform);
      if (livePoint) {
        // Avoid duplicate if the last historical point is very recent
        const lastHistorical = historical[historical.length - 1];
        if (!lastHistorical || Math.abs(new Date(lastHistorical.captured_at) - new Date(livePoint.captured_at)) > 60000) {
          historical.push(livePoint);
        }
      }
    }
    return historical;
  }

  // Picks the metric to chart based on campaign type
  function sparklineMetric(d) {
    if (d.campaign_type === 'awareness') return d.reach || 0;
    if (d.campaign_type === 'traffic') return d.link_clicks || 0;
    return (d.shares || 0) + (d.saves || 0) + (d.comments || 0) + (d.likes || 0);
  }

  function sparklineLabel(d) {
    return 'Momentum Tracker';
  }

  // Builds an inline SVG sparkline from an array of numeric values
  function buildSparklineSVG(values, color) {
    const w = 260, h = 32, pad = 2;
    if (values.length < 2) return '';
    const min = Math.min(...values), max = Math.max(...values);
    const range = max - min || 1;
    const points = values.map((v, i) => {
      const x = pad + (i / (values.length - 1)) * (w - pad * 2);
      const y = pad + (1 - (v - min) / range) * (h - pad * 2);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    });
    // Gradient fill under the line
    const fillPoints = [
      `${pad},${h}`,
      ...points,
      `${(w - pad).toFixed(1)},${h}`
    ].join(' ');
    return `<svg class="sparkline-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <defs><linearGradient id="sg_${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
      </linearGradient></defs>
      <polygon points="${fillPoints}" fill="url(#sg_${color.replace('#','')})" />
      <polyline points="${points.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${points[points.length-1].split(',')[0]}" cy="${points[points.length-1].split(',')[1]}" r="2.5" fill="${color}"/>
    </svg>`;
  }

  // Builds the full sparkline card section
  function buildSparkline(ad) {
    const history = getSparklineData(ad);
    const values = history.map(d => sparklineMetric(d));
    const label = sparklineLabel(ad);
    const color = ad.campaign_type === 'awareness' ? '#53B7E8' : ad.campaign_type === 'traffic' ? '#34D399' : '#A855F7';

    let h = `<div class="sparkline-wrap">`;
    h += `<div class="sparkline-header">`;
    h += `<span class="sparkline-title">${label}</span>`;

    if (values.length >= 2) {
      const first = values[0], last = values[values.length - 1];
      const pctChange = first > 0 ? ((last - first) / first * 100) : 0;
      const arrow = pctChange > 0 ? '\u2191' : pctChange < 0 ? '\u2193' : '\u2192';
      const cls = pctChange > 0 ? 'up' : pctChange < 0 ? 'down' : 'flat';
      h += `<span class="sparkline-trend ${cls}">${arrow} ${Math.abs(pctChange).toFixed(0)}%</span>`;
    }

    h += `</div>`;

    if (values.length >= 2) {
      h += buildSparklineSVG(values, color);
    } else {
      h += `<div class="sparkline-empty">Trend available after 2+ captures</div>`;
    }

    h += `</div>`;
    return h;
  }

  // ====== HELPERS ======
  function fmt(n) {
    if (n == null) return '0';
    if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
    if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
    return n.toLocaleString();
  }
  function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
  function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
  function sColor(s) {
    if (s >= 70) return 'var(--green)';
    if (s >= 40) return 'var(--orange)';
    return 'var(--red)';
  }
</script>
</body>
